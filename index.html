<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --surf:#f6f8fa; --bd:#e1e4e8; --bd2:#d0d7de;
  --amber:#4f46e5; --blue:#0969da; --txt:#1f2328; --mut:#57606a;
}

/* ── Suggestions queue view ───────────────────────────────────────── */
.sgq{ background:var(--surf); color:var(--txt); font-size:13px; line-height:1.5; }
.sgq .sgq-strip{ max-width:760px; margin:0 auto; padding:12px 20px 2px; color:var(--mut); font-size:12px; display:flex; align-items:center; gap:7px; }
.sgq .sgq-strip i{ color:#8b949e; font-size:15px; }
.sgq .sgq-wrap{ max-width:760px; margin:0 auto; padding:10px 20px 120px; display:flex; flex-direction:column; gap:12px; }
.sgq .sgq-card{ background:var(--bg); border:1px solid var(--bd); border-radius:10px; overflow:visible; box-shadow:0 1px 2px rgba(27,31,36,.04); transition:box-shadow .15s, border-color .15s; animation:sgq-rise .4s cubic-bezier(.2,.7,.3,1) both; }
.sgq .sgq-card:hover{ box-shadow:0 4px 14px rgba(27,31,36,.08); border-color:var(--bd2); }
@keyframes sgq-rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
.sgq .sgq-chead{ display:flex; align-items:flex-start; gap:11px; padding:13px 15px 10px; }
.sgq .sgq-avatar{ flex:none; width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-size:12px; }
.sgq .sgq-who{ flex:1; min-width:0; }
.sgq .sgq-subject{ font-weight:600; font-size:13px; color:var(--txt); margin-bottom:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sgq .sgq-frm{ font-size:11.5px; color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sgq .sgq-frm b{ color:var(--txt); font-weight:500; }
.sgq .sgq-metacol{ flex:none; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.sgq .sgq-date{ font-size:11px; color:#8b949e; white-space:nowrap; }
.sgq .sgq-pill{ font-size:10.5px; font-weight:600; padding:2px 7px; border-radius:20px; white-space:nowrap; }
.sgq .sgq-pill.hi{ color:#16a34a; background:#dcfce7; }
.sgq .sgq-pill.mid{ color:#c47b00; background:#fef3c7; }
.sgq .sgq-pill.lo{ color:#dc2626; background:#fee2e2; }
.sgq .sgq-body{ padding:0 15px 13px; }
.sgq .sgq-mailprev{ font-size:12.5px; color:var(--mut); white-space:pre-wrap; line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; padding:9px 11px; background:var(--surf); border:1px solid var(--bd); border-radius:7px; }
.sgq .sgq-mailprev.open{ display:block; -webkit-line-clamp:unset; }
.sgq .sgq-viewmail{ cursor:pointer; color:var(--mut); font-size:11.5px; display:inline-flex; align-items:center; gap:4px; margin-top:6px; }
.sgq .sgq-viewmail:hover{ color:var(--amber); }
.sgq .sgq-lbl{ font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#8b949e; margin:13px 0 5px 1px; }
.sgq .sgq-note{ width:100%; font:inherit; font-size:12.5px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:7px; padding:8px 10px; resize:vertical; min-height:46px; line-height:1.55; box-sizing:border-box; }
.sgq .sgq-note:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-pickerbox{ background:var(--surf); border:1px solid var(--bd); border-radius:7px; padding:9px 10px; }
.sgq .sgq-pickerbox.warn{ background:#fffbf2; border-color:#f3e2bf; }
.sgq .sgq-target{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:var(--surf); border:1px solid var(--bd); border-radius:7px; padding:7px 10px; font-size:12px; }
.sgq .sgq-target.warnrow{ background:#fffbf2; border-color:#f3e2bf; }
.sgq .sgq-target > i{ font-size:15px; color:#8b949e; }
.sgq .sgq-crumbline{ font-size:12px; color:var(--txt); display:inline-flex; align-items:center; flex-wrap:wrap; }
.sgq .sgq-crumbline .sgq-arrow{ padding:0 3px; color:#8b949e; }
.sgq .sgq-hybridrow{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.sgq .sgq-linkbtn{ cursor:pointer; color:var(--mut); font-size:11.5px; margin-top:7px; display:inline-block; }
.sgq .sgq-linkbtn:hover{ color:var(--amber); }
.sgq .sgq-changebtn{ cursor:pointer; border:1px solid var(--bd2); background:var(--bg); color:var(--mut); font:inherit; font-size:11px; padding:4px 10px; border-radius:6px; display:inline-flex; align-items:center; gap:5px; transition:.12s; }
.sgq .sgq-changebtn:hover{ border-color:var(--amber); color:var(--amber); }
.sgq .sgq-ta{ position:relative; }
.sgq .sgq-ta-inputwrap{ display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:5px 8px; }
.sgq .sgq-ta-inputwrap:focus-within{ border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-ta-inputwrap i{ color:#8b949e; font-size:15px; }
.sgq .sgq-ta-input{ flex:1; border:none; outline:none; font:inherit; font-size:12.5px; background:transparent; color:var(--txt); }
.sgq .sgq-ta-list{ position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--bg); border:1px solid var(--bd2); border-radius:8px; box-shadow:0 8px 24px rgba(27,31,36,.12); max-height:240px; overflow:auto; z-index:30; }
.sgq .sgq-ta-item{ padding:7px 10px; cursor:pointer; border-bottom:1px solid var(--surf); }
.sgq .sgq-ta-item:last-child{ border-bottom:none; }
.sgq .sgq-ta-item:hover{ background:#eef2ff; }
.sgq .sgq-ta-item .sgq-nm{ font-size:12.5px; font-weight:600; color:var(--txt); }
.sgq .sgq-ta-item .sgq-cr{ font-size:10.5px; color:#8b949e; margin-top:1px; }
.sgq .sgq-ta-empty{ padding:9px 10px; font-size:12px; color:#8b949e; }
.sgq .sgq-needpick{ color:#c47b00; font-weight:600; font-size:11.5px; }
.sgq .sgq-changes{ margin-top:13px; }
.sgq .sgq-chg{ display:flex; align-items:center; gap:8px; padding:8px 9px; border:1px solid var(--bd); border-radius:7px; margin-bottom:6px; font-size:12px; background:var(--bg); }
.sgq .sgq-field{ font-weight:600; color:var(--mut); min-width:80px; }
.sgq .sgq-statuslabel{ display:inline-flex; align-items:center; gap:5px; }
.sgq .sgq-fromval{ color:#8b949e; text-decoration:line-through; display:inline-flex; align-items:center; gap:5px; }
.sgq .sgq-toarrow{ color:#8b949e; font-size:14px; }
.sgq .sgq-grow{ flex:1; }
.sgq .sgq-x{ cursor:pointer; color:#8b949e; font-size:15px; padding:2px; border-radius:5px; display:flex; }
.sgq .sgq-x:hover{ color:#dc2626; background:#fee2e2; }
.sgq .sgq-miniinput{ font:inherit; font-size:12px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:2px 6px; }
.sgq .sgq-miniinput:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-miniinput[type=number]{ width:62px; }
.sgq .sgq-sel{ font:inherit; font-size:12px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:3px 6px; cursor:pointer; }
.sgq .sgq-sel:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; flex:none; }
.sgq .sgq-foot{ display:flex; align-items:center; gap:9px; padding:11px 15px; border-top:1px solid var(--bd); background:#fafbfc; border-radius:0 0 10px 10px; }
.sgq .sgq-actbtn{ cursor:pointer; font:inherit; font-size:12px; font-weight:600; padding:6px 14px; border-radius:7px; border:1px solid transparent; display:inline-flex; align-items:center; gap:6px; transition:.12s; }
.sgq .sgq-actbtn.approve{ background:var(--amber); color:#fff; }
.sgq .sgq-actbtn.approve:hover{ background:#4338ca; }
.sgq .sgq-actbtn.approve:disabled{ background:#c7cbd1; cursor:not-allowed; }
.sgq .sgq-actbtn.reject{ background:var(--bg); color:var(--mut); border-color:var(--bd2); }
.sgq .sgq-actbtn.reject:hover{ border-color:#dc2626; color:#dc2626; }
.sgq .sgq-foot .sgq-hint{ font-size:11px; color:#8b949e; margin-left:auto; }
.sgq .sgq-empty{ text-align:center; padding:70px 20px; color:var(--mut); }
.sgq .sgq-empty h3{ font-size:15px; font-weight:600; color:var(--txt); margin-bottom:5px; }
.sgq .sgq-empty p{ font-size:12.5px; }
.sgq .sgq-loading{ text-align:center; padding:40px 20px; color:#8b949e; font-size:12.5px; }
.sgq .sgq-addchange{ margin-top:10px; }
.sgq .sgq-addrow{ display:flex; gap:6px; flex-wrap:wrap; }
.sgq .sgq-addbtn{ cursor:pointer; border:1px dashed var(--bd2); background:transparent; color:var(--mut); font:inherit; font-size:11px; padding:4px 10px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; transition:.12s; }
.sgq .sgq-addbtn:hover{ border-color:var(--amber); border-style:solid; color:var(--amber); background:#eef2ff; }
.sgq .sgq-addbtn i{ font-size:13px; }

html, body, #root { height: 100%; overflow: hidden; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--txt); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #b0b7c0; border-radius: 5px; border: 2px solid var(--bg); min-height: 60px; min-width: 60px; }
::-webkit-scrollbar-thumb:hover { background: #6e7680; }
.btn { cursor: pointer; border: 1px solid var(--bd2); background: var(--surf); color: var(--mut);
  padding: 3px 10px; border-radius: 3px; font-size: 11px; font-family: 'Inter', system-ui, sans-serif;
  transition: border-color .15s, color .15s; white-space: nowrap; line-height: 1.6; }
.btn:hover { border-color: var(--amber); color: var(--amber); }
.btn.act { border-color: var(--amber); color: var(--amber); background: #eef2ff; }
.btn.vact { border-color: var(--blue); color: var(--blue); }

/* ── Mobile-only header (≤ 767px). Desktop layout untouched. ── */
@media (max-width: 767px) {
  .app-header {
    display: grid !important;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: auto auto;
    gap: 8px 8px !important;
    align-items: center;
    padding: 8px 10px !important;
  }
  /* Row 1 placement */
  .app-header > svg { grid-column: 1; grid-row: 1; justify-self: start; margin-right: 0 !important; }
  .app-header > .hdr-mode { grid-column: 2; grid-row: 1; }
  .app-header > .hdr-actions { grid-column: 3; grid-row: 1; justify-self: end; margin-left: 0 !important; }
  /* Row 2 — only renders in Projects mode */
  .app-header > .hdr-project { grid-column: 1; grid-row: 2; justify-self: start; margin-left: 0 !important; }
  .app-header > .hdr-view { grid-column: 2; grid-row: 2; margin-left: 0 !important; }
  /* Hide the flex spacer — irrelevant in grid */
  .app-header > div[style*="flex:1"] { display: none !important; }
  /* Hide divider line inside project picker wrap on mobile (no longer needed) */
  .app-header > .hdr-project > div[style*="width:1px"] { display: none !important; }
  /* Slightly larger tap targets */
  .app-header .btn { padding: 5px 10px !important; font-size: 11.5px !important; }
}
.ei { background: #ffffff; border: 1px solid var(--blue); outline: none; color: #1f2328;
  padding: 0 6px; font-size: 12px; font-family: 'Inter', system-ui, sans-serif; height: 36px; width: 100%; }
select.ei { cursor: pointer; }
.drow { display: flex; border-bottom: 1px solid var(--bd); border-left: 2px solid transparent;
  position: absolute; left: 0; right: 0; }
.drow:hover { box-shadow: inset 0 1px 0 #94a3b8, inset 0 -1px 0 #94a3b8; }
.gbar { cursor: default; user-select: none; position: absolute; top: 50%; transform: translateY(-50%);
  border-radius: 2px; overflow: hidden; display: flex; align-items: center; }
.gbar:hover { filter: brightness(0.88) saturate(1.4); }

.ms { position: absolute; top: 50%; transform: translateY(-50%) rotate(45deg); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--amber); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }
input[type=range]::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:var(--amber); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }

</style>

// Normalise: plain int or {id,type,lag} → always {id,type,lag}
const normPreds = arr => {
  if (!Array.isArray(arr)) return [];
  return arr.map(x => {
    if (x === null || x === undefined) return null;
    if (typeof x === "object") return {id: x.id, type: (x.type||"FS").toUpperCase(), lag: x.lag||0};
    if (typeof x === "number" && !isNaN(x)) return {id: x, type: "FS", lag: 0};
    return null;
  }).filter(Boolean);
};

const showToast = (() => {

  return (msg, { type = "error", duration = 3000 } = {}) => {

    if (_activeToast) { _activeToast.remove(); _activeToast = null; }

    });

    const icon = document.createElement("span");
    icon.textContent = isError ? "⚠" : "✓";
    Object.assign(icon.style, {
      fontSize: "13px",
      flexShrink: "0",
      lineHeight: "1",
    });

    const text = document.createElement("span");
    text.textContent = msg;

    el.appendChild(icon);
    el.appendChild(text);

const parsePreds = raw => {
  const str = String(raw||"").trim();
  if (!str) return [];
  return str.split(/[,;]/).map(p => {
    p = p.trim(); if (!p) return null;
    const m = p.match(/^(\d+)\s*(FS|FF|SS|SF)?\s*([+-]\s*\d+)?\s*d?$/i);
    if (!m) return null;
    return {id: parseInt(m[1]), type: (m[2]||"FS").toUpperCase(), lag: m[3] ? parseInt(m[3].replace(/\s/g,"")) : 0};
  }).filter(Boolean);
};

// Format [{id,type,lag}] → display string
const fmtPreds = preds => normPreds(preds).map(p => {
  let s = String(p.id);
  if (p.type !== "FS" || p.lag !== 0) {
    s += p.type;
    if (p.lag !== 0) s += (p.lag > 0 ? "+" : "") + p.lag + "d";
  }
  return s;
}).join(", ");

// Constrained start of a task given one predecessor dep (MS Project convention)
// End dates are INCLUSIVE (last working day of task), so:
//   FS: successor starts NEXT BD after pred.end  (+lag BDs on top)
//   SS: successor starts same day as pred.start  (+lag)
//   FF: successor ends same day as pred.end (+lag) → derive start
//   SF: successor ends same day as pred.start (+lag) → derive start
const constrainedStartFrom = (pred, dep, taskDur) => {
  const lag = dep.lag || 0;
  switch ((dep.type||"FS").toUpperCase()) {
    case "FS": return addBD(pred.end, 1 + lag);                                          // next BD + lag
    case "SS": return addBD(pred.start, lag);                                            // same start + lag
    case "FF": { const cEnd = addBD(pred.end, lag);                                      // end aligns + lag
                 return taskDur <= 1 ? cEnd : addBD(cEnd, 1 - taskDur); }
    case "SF": { const cEnd = addBD(pred.start, lag);                                    // finish at pred.start + lag
                 return taskDur <= 1 ? cEnd : addBD(cEnd, 1 - taskDur); }
    default:   return addBD(pred.end, 1 + lag);
  }
};

// end = last working day (inclusive). duration 0 = milestone (start=end)
const calcEnd = (start, dur) => !start ? "" : dur === 0 ? start : addBD(start, Math.max(0, dur - 1));

// Topological cascade: recompute start/end for all tasks driven by predecessors
const cascadeDates = tasks => {
  const map = {};
  tasks.forEach(t => { map[t.id] = {...t, predecessors: normPreds(t.predecessors)}; });
  const adj = {}; const inDeg = {};
  tasks.forEach(t => { adj[t.id] = []; inDeg[t.id] = 0; });
  tasks.forEach(t => map[t.id].predecessors.forEach(p => {
    if (map[p.id]) { adj[p.id].push(t.id); inDeg[t.id]++; }
  }));
  const queue = tasks.filter(t => inDeg[t.id] === 0).map(t => t.id);
  const seen = new Set(queue);
  let qi = 0;
  while (qi < queue.length) {
    const id = queue[qi++];
    (adj[id]||[]).forEach(sid => {
      inDeg[sid]--;
      if (inDeg[sid] <= 0 && !seen.has(sid)) { seen.add(sid); queue.push(sid); }
    });
  }
  tasks.forEach(t => { if (!seen.has(t.id)) queue.push(t.id); });

  queue.forEach(id => {
    const t = map[id];
    const preds = t.predecessors.filter(p => map[p.id]);
    // _pinStart preserves manually dragged/set positions. Duration-only edits (hasDirectEdit)
    // let predecessors re-anchor the start so successors cascade correctly.
    if (!preds.length || t.pinnedStart) { t.end = calcEnd(t.start, t.duration); return; }
    const starts = preds.map(p => constrainedStartFrom(map[p.id], p, t.duration)).filter(Boolean);
    if (!starts.length) { t.end = calcEnd(t.start, t.duration); return; }
    const latest = starts.reduce((a,b) => a>b?a:b, starts[0] || t.start);
    t.start = latest;
    t.end   = calcEnd(t.start, t.duration);
  });
  return tasks.map(t => { const {_pinStart, __wasDirectEdit, ...rest} = map[t.id] || t; return rest; });
};

// Roll up parent start/end/duration from their children (bottom-up, iterates until stable)
const rollupParentDates = tasks => {
  const map = {};
  tasks.forEach(t => { map[t.id] = {...t}; });
  const parentIds = new Set(tasks.filter(t => t.parentId !== null).map(t => t.parentId));
  if (!parentIds.size) return tasks;
  let changed = true;
  while (changed) {
    changed = false;
    parentIds.forEach(pid => {
      const children = Object.values(map).filter(t => t.parentId === pid);
      if (!children.length) return;
      // Ignore children with empty start/end so a blank new task doesn't drag the parent dates to ""
      const validStarts = children.map(t => t.start).filter(Boolean);
      const validEnds   = children.map(t => t.end  ).filter(Boolean);
      if (!validStarts.length || !validEnds.length) return; // all children blank → leave parent as-is
      const newStart = validStarts.reduce((a,b) => a<b?a:b);
      const newEnd   = validEnds.reduce((a,b) => a>b?a:b);
      const newDur   = (newStart === newEnd && children.every(c => c.duration === 0)) ? 0 : Math.max(0, difBD(newStart, newEnd) + 1);
      if (map[pid].start !== newStart || map[pid].end !== newEnd || map[pid].duration !== newDur) {
        map[pid] = {...map[pid], start: newStart, end: newEnd, duration: newDur};
        changed = true;
      }
    });
  }
  return tasks.map(t => map[t.id]);
};

const NOW  = fd(new Date());

// Compute display health from conditional formatting rules
const computeDisplayHealth = (task, settings) => {
  const cf = settings?.cfRules || {};
  if (!task) return task?.health;
  // Rule order matters: more specific overrides general
  if (cf.completeGreen && (task.percentComplete||0) >= 100) return "green";
  if (cf.overdueRed && task.end && task.end < NOW && task.health !== "green" && task.health !== "paused" && task.health !== "red") return "red";
  if (cf.dueSoonYellow && task.end && task.end >= NOW && task.health === "gray") {
    // Within 7 calendar days
    const today = new Date(NOW + "T12:00:00");
    const end = new Date(task.end + "T12:00:00");
    const days = Math.ceil((end - today) / 86400000);
    if (days <= 7) return "yellow";
  }
  return task.health;
};
const fmtD = s => { if (!s) return ""; const [y,m,d] = s.split('-'); return String(+m).padStart(2,'0')+'/'+String(+d).padStart(2,'0')+'/'+y.slice(2); };
const toShortDate = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return `${+m}/${+d}/${y.slice(2)}`; };
const parseFlexDate = s => {
  if (!s) return null; s = s.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const parts = s.split(/[\/\-\.]/);
  if (parts.length < 2) return null;
  const m = parseInt(parts[0], 10), d = parseInt(parts[1], 10);
  let y = parts[2] !== undefined ? parseInt(parts[2], 10) : new Date().getFullYear();
  if (y < 100) y += 2000;
  if (m < 1 || m > 12 || d < 1 || d > 31 || y < 2000) return null;
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
};

// Fix #1: helper – pick a sensible default start for a new task
const defaultStartFor = (tasks, parentId, excludeId = null) => {
  if (parentId !== null) {
    const parent = tasks.find(t => t.id === parentId);
    if (parent?.start) return parent.start;
  }
  const sibs = tasks.filter(t => t.parentId === parentId && t.id !== excludeId);
  for (let i = sibs.length - 1; i >= 0; i--) {
    if (sibs[i].start) return sibs[i].start;
  }
  return NOW;
};

// Fix #1e: guard mkt so a bad caller can never crash the app with an invalid date.
// Also supports "blank" tasks: pass start="" AND dur="" (or null) → task is created with
// no start, no end, no duration. Callers that want a real date keep passing valid args.
const mkt = (id, name, start, dur, parentId=null, health="gray", predecessors=[]) => {
  const isBlank = !start && (dur === "" || dur === null || dur === undefined);
  const safeStart = isBlank ? "" : ((start && !isNaN(new Date(start).getTime())) ? start : NOW);
  const safeDur   = isBlank ? "" : dur;
  return {
    id, name, start: safeStart, end: calcEnd(safeStart, safeDur), duration: safeDur, predecessors, health,
    percentComplete: health==="green" ? 100 : health==="yellow" ? 40 : 0,
    parentId, responsibleParty: "", notes: [], isExpanded: true,
  };
};

// Renumber all tasks by array position (1-based) and fix all ID references
const renumberTasks = (tasks) => {
  const map = {};
  tasks.forEach((t, i) => { map[t.id] = i + 1; });
  return tasks.map((t, i) => ({
    ...t,
    id: i + 1,
    parentId: t.parentId !== null && t.parentId !== undefined ? (map[t.parentId] ?? null) : null,
    predecessors: normPreds(t.predecessors).map(p => ({...p, id: map[p.id]})).filter(p => p.id),
  }));
};

// Sort tasks array into visual (tree-walk) order so IDs always match what the user sees
const sortByVisualOrder = (tasks) => {
  const childMap = {};
  tasks.forEach(t => {
    const p = t.parentId ?? null;
    if (!childMap[p]) childMap[p] = [];
    childMap[p].push(t);
  });
  const result = [];
  const walk = (parentId) => {
    (childMap[parentId] || []).forEach(t => { result.push(t); walk(t.id); });
  };
  walk(null);
  // Append any orphaned tasks (parentId pointing to non-existent task) at the end
  const seen = new Set(result.map(t => t.id));
  tasks.filter(t => !seen.has(t.id)).forEach(t => result.push(t));
  return result;
};

function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}
const AVATAR_COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
function avatarColor(name) {
  if (!name) return '#94a3b8';
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// Shared canvas for measuring typed-text width so the inline ghost prediction
// lines up exactly with the input's text regardless of font/padding.
const _cpCanvas = (typeof document !== 'undefined') ? document.createElement('canvas') : null;
const _cpCtx = _cpCanvas ? _cpCanvas.getContext('2d') : null;
function _cpMeasure(text, font) { if (!_cpCtx) return 0; _cpCtx.font = font; return _cpCtx.measureText(text).width; }

function ContactPicker({ value, contacts, onCommit, onCancel, variant = "master" }) {
  const isGrid = variant === "grid";
  const [query, setQuery] = React.useState(value || '');
  const [highlight, setHighlight] = React.useState(-1);
  const [pos, setPos] = React.useState(null);      // portal dropdown rect {left,top,width}
  const [ghost, setGhost] = React.useState(null);  // {left, fontSize, fontFamily, fontWeight}
  const inputRef = React.useRef(null);
  const wrapRef = React.useRef(null);

  React.useEffect(() => { inputRef.current?.focus(); inputRef.current?.select(); }, []);

  const q = query.trim().toLowerCase();
  const suggestions = (q
    ? contacts.filter(c => c.name.toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q))
    : contacts
  ).slice(0, 6);

  const trimmed = query.trim();
  const isNewName = trimmed.length > 0 && !contacts.some(c => c.name.toLowerCase() === trimmed.toLowerCase());
  const totalItems = suggestions.length + (isNewName ? 1 : 0);

  // Inline prediction = first contact whose name starts with what's typed (prefix match)
  const prediction = query
    ? contacts.find(c => c.name.toLowerCase().startsWith(query.toLowerCase()) && c.name.length > query.length)
    : null;
  const ghostText = prediction ? prediction.name.slice(query.length) : '';

  React.useEffect(() => { setHighlight(h => h >= totalItems ? -1 : h); }, [totalItems]);

  // Position portal dropdown under the input + compute the ghost text offset
  const reposition = React.useCallback(() => {
    const el = inputRef.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    setPos({ left: r.left, top: r.bottom + 2, width: Math.max(220, r.width) });
    const cs = window.getComputedStyle(el);
    const fontFamily = cs.fontFamily, fontSize = cs.fontSize, fontWeight = cs.fontWeight || '400';
    const padL = parseFloat(cs.paddingLeft) || 0;
    const bordL = parseFloat(cs.borderLeftWidth) || 0;
    const w = _cpMeasure(query, `${fontWeight} ${fontSize} ${fontFamily}`);
    setGhost({ left: padL + bordL + w, fontSize, fontFamily, fontWeight });
  }, [query]);

  React.useLayoutEffect(() => { reposition(); }, [reposition]);
  React.useEffect(() => {
    const fn = () => reposition();
    window.addEventListener('scroll', fn, true);
    window.addEventListener('resize', fn);
    return () => { window.removeEventListener('scroll', fn, true); window.removeEventListener('resize', fn); };
  }, [reposition]);

  function commitTyped() {
    if (!trimmed) { onCommit(''); return; }
    const existing = contacts.find(c => c.name.toLowerCase() === trimmed.toLowerCase());
    if (existing) onCommit(existing.name);
    else onCommit(trimmed, { name: trimmed, email: '' }); // auto-add as new contact
  }
  function selectItem(i) { if (i < suggestions.length) onCommit(suggestions[i].name); else commitTyped(); }
  function acceptGhost() {
    if (!prediction) return;
    const full = prediction.name;
    setQuery(full);
    requestAnimationFrame(() => { const el = inputRef.current; if (el) el.setSelectionRange(full.length, full.length); });
  }

  // Outside click commits typed text (don't lose work). Clicks in the portal dropdown are ignored.
  React.useEffect(() => {
    function onDocMouseDown(e) {
      if (wrapRef.current && wrapRef.current.contains(e.target)) return;
      if (e.target.closest && e.target.closest('[data-contact-dd]')) return;
      commitTyped();
    }
    document.addEventListener('mousedown', onDocMouseDown);
    return () => document.removeEventListener('mousedown', onDocMouseDown);
  }, [query]);

  function onKeyDown(e) {
    if (e.key === 'Escape') { e.stopPropagation(); onCancel(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(h => Math.min(h + 1, totalItems - 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setHighlight(h => Math.max(h - 1, -1)); return; }
    if (e.key === 'ArrowRight') {
      const el = inputRef.current;
      const atEnd = el && el.selectionStart === query.length && el.selectionEnd === query.length;
      if (ghostText && atEnd) { e.preventDefault(); acceptGhost(); }
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.stopPropagation();
      if (e.key === 'Enter') e.preventDefault();
      if (highlight >= 0 && highlight < totalItems) selectItem(highlight);
      else if (ghostText && prediction) onCommit(prediction.name);
      else commitTyped();
      return;
    }
  }

  const masterInputStyle = { width:'100%', height:'22px', border:'none', borderBottom:'1.5px solid var(--blue)',
    outline:'none', background:'transparent', color:'var(--txt)', fontSize:12, fontFamily:'inherit', padding:'0 2px' };

  const dropdown = (totalItems > 0 && pos) ? ReactDOM.createPortal(
    <div data-contact-dd style={{position:'fixed', left:pos.left, top:pos.top, width:pos.width, zIndex:100000,
      background:'#fff', border:'1px solid var(--bd2)', borderRadius:7, boxShadow:'0 6px 20px rgba(0,0,0,.13)',
      overflow:'hidden', maxHeight:220, overflowY:'auto'}}>
      {suggestions.map((c, i) => (
        <div key={c.id}
          onMouseEnter={()=>setHighlight(i)}
          onMouseDown={e=>{ e.preventDefault(); onCommit(c.name); }}
          style={{display:'flex', alignItems:'center', gap:8, padding:'7px 10px', cursor:'pointer',
            background: highlight===i ? '#f0f2ff' : 'transparent'}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:avatarColor(c.name),
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0}}>{getInitials(c.name)}</div>
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,color:'var(--txt)',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
            {c.email && <div style={{fontSize:10,color:'var(--mut)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.email}</div>}
          </div>
        </div>
      ))}
      {isNewName && (
        <div onMouseEnter={()=>setHighlight(suggestions.length)}
          onMouseDown={e=>{ e.preventDefault(); commitTyped(); }}
          style={{display:'flex', alignItems:'center', gap:7, padding:'7px 10px', cursor:'pointer',
            borderTop: suggestions.length ? '1px solid var(--bd)' : 'none',
            color:'var(--blue)', fontSize:11, fontWeight:500,
            background: highlight===suggestions.length ? '#f0f5ff' : 'transparent'}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span>
          <span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Add "<span style={{fontWeight:600}}>{trimmed}</span>" as new contact</span>
        </div>
      )}
    </div>, document.body) : null;

  return (
    <div ref={wrapRef} style={{position:'relative', width:'100%'}}>
      <input ref={inputRef} value={query}
        className={isGrid ? "ei" : undefined}
        style={isGrid ? undefined : masterInputStyle}
        onChange={e=>setQuery(e.target.value)}
        onKeyDown={onKeyDown}
        placeholder="Type a name…" />
      {ghostText && ghost && (
        <span aria-hidden style={{position:'absolute', left:ghost.left, top:0, height:'100%',
          display:'flex', alignItems:'center', pointerEvents:'none', whiteSpace:'pre',
          fontSize:ghost.fontSize, fontFamily:ghost.fontFamily, fontWeight:ghost.fontWeight,
          color:'var(--mut)', opacity:0.5, overflow:'hidden',
          maxWidth:`calc(100% - ${ghost.left}px - 4px)`}}>{ghostText}</span>
      )}
      {dropdown}
    </div>
  );
}

  const contacts = data.settings?.contacts || [];
  const [editId, setEditId] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const [editEmail, setEditEmail] = React.useState('');
  const [addMode, setAddMode] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newEmail, setNewEmail] = React.useState('');

  function saveContacts(updated) {
    setData(d => ({...d, settings:{...d.settings, contacts: updated}}));
  }
  function startEdit(c) { setEditId(c.id); setEditName(c.name); setEditEmail(c.email||''); setAddMode(false); }
  function commitEdit() {
    if (!editName.trim()) return;
    saveContacts(contacts.map(c => c.id===editId ? {...c, name:editName.trim(), email:editEmail.trim()} : c));
    setEditId(null);
  }
  function del(id) { saveContacts(contacts.filter(c => c.id!==id)); }
  function addContact() {
    if (!newName.trim()) return;
    const id = Date.now();
    saveContacts([...contacts, {id, name:newName.trim(), email:newEmail.trim()}]);
    setNewName(''); setNewEmail(''); setAddMode(false);
  }

  return (
    <div style={{position:'fixed',inset:0,zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.32)'}}>
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 12px 40px rgba(0,0,0,.18)',width:420,maxWidth:'94vw',maxHeight:'80vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'16px 20px 12px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--txt)'}}>Contacts</div>
            <div style={{fontSize:11,color:'var(--mut)',marginTop:2}}>{contacts.length} contact{contacts.length!==1?'s':''}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--mut)',fontSize:18,lineHeight:1,padding:'4px 6px',borderRadius:5}}
            onMouseEnter={e=>e.currentTarget.style.background='#f0f0f0'} onMouseLeave={e=>e.currentTarget.style.background='none'}>✕</button>
        </div>
        {/* List */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
          {contacts.length===0 && !addMode && (
            <div style={{padding:'24px 20px',textAlign:'center',color:'var(--mut)',fontSize:13}}>
              No contacts yet. Add one below.
            </div>
          )}
          {contacts.map(c => (
            <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 20px',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#f8f9fa'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              {editId===c.id ? (
                <div style={{flex:1,display:'flex',gap:6,alignItems:'center'}}>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    autoFocus placeholder="Name *"
                    style={{flex:1,fontSize:12,border:'1px solid var(--blue)',borderRadius:4,padding:'4px 7px',fontFamily:'inherit',outline:'none'}}
                    onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')setEditId(null);}} />
                  <input value={editEmail} onChange={e=>setEditEmail(e.target.value)}
                    placeholder="Email"
                    style={{flex:1,fontSize:12,border:'1px solid var(--bd2)',borderRadius:4,padding:'4px 7px',fontFamily:'inherit',outline:'none'}}
                    onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--bd2)'}
                    onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')setEditId(null);}} />
                  <button onClick={commitEdit} style={{fontSize:11,padding:'4px 9px',borderRadius:4,border:'1px solid var(--amber)',background:'#eef2ff',color:'var(--amber)',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>Save</button>
                  <button onClick={()=>setEditId(null)} style={{fontSize:11,padding:'4px 7px',borderRadius:4,border:'1px solid var(--bd2)',background:'none',color:'var(--mut)',cursor:'pointer',fontFamily:'inherit'}}>✕</button>
                </div>
              ) : (<>
                <div style={{width:32,height:32,borderRadius:'50%',background:avatarColor(c.name),
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:11,fontWeight:700,color:'#fff',flexShrink:0}}>{getInitials(c.name)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:'var(--txt)',fontWeight:500}}>{c.name}</div>
                  {c.email && <div style={{fontSize:11,color:'var(--mut)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.email}</div>}
                  {!c.email && <div style={{fontSize:11,color:'var(--bd2)'}}>No email</div>}
                </div>
                <button onClick={()=>startEdit(c)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--mut)',padding:'4px 6px',borderRadius:4,fontSize:11,fontFamily:'inherit'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#e8eaf0'} onMouseLeave={e=>e.currentTarget.style.background='none'}>Edit</button>
                <button onClick={()=>del(c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#f85149',padding:'4px 6px',borderRadius:4,fontSize:16,lineHeight:1}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fef2f2'} onMouseLeave={e=>e.currentTarget.style.background='none'}>×</button>
              </>)}
            </div>
          ))}
        </div>
        {/* Add contact */}
        <div style={{borderTop:'1px solid var(--bd)',padding:'12px 20px',flexShrink:0}}>
          {!addMode ? (
            <button onClick={()=>setAddMode(true)}
              style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--blue)',fontWeight:500,
                background:'none',border:'1px dashed var(--bd2)',borderRadius:6,padding:'7px 14px',cursor:'pointer',width:'100%',justifyContent:'center',fontFamily:'inherit'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--blue)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--bd2)'}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> Add Contact
            </button>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:8}}>
                <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
                  placeholder="Full name *" style={{flex:1,fontSize:12,border:'1px solid var(--blue)',borderRadius:5,padding:'6px 9px',fontFamily:'inherit',outline:'none'}}
                  onKeyDown={e=>{if(e.key==='Enter')addContact();if(e.key==='Escape')setAddMode(false);}} />
                <input value={newEmail} onChange={e=>setNewEmail(e.target.value)}
                  placeholder="Email (optional)" style={{flex:1,fontSize:12,border:'1px solid var(--bd2)',borderRadius:5,padding:'6px 9px',fontFamily:'inherit',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--bd2)'}
                  onKeyDown={e=>{if(e.key==='Enter')addContact();if(e.key==='Escape')setAddMode(false);}} />
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={addContact} style={{flex:1,fontSize:12,padding:'7px 0',borderRadius:5,
                  border:'1px solid var(--amber)',background:'#eef2ff',color:'var(--amber)',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>
                  Add Contact
                </button>
                <button onClick={()=>{setAddMode(false);setNewName('');setNewEmail('');}}
                  style={{fontSize:12,padding:'7px 14px',borderRadius:5,border:'1px solid var(--bd2)',
                    background:'none',color:'var(--mut)',cursor:'pointer',fontFamily:'inherit'}}>
                  Cancel
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── HistoryPanel — browse / preview / restore snapshots from planar_history ─
function HistoryPanel({ data, setData, onClose }) {
  const [rows, setRows]           = useState(null);   // null = loading
  const [previewRow, setPreviewRow] = useState(null);
  const [previewData, setPreviewData] = useState(null); // parsed full snapshot
  const [busy, setBusy]           = useState(false);

  // Fetch list on mount
  useEffect(() => {
    let alive = true;
    (async () => {
      const list = await window.storage.getHistory("hs-v1", 100);
      if (alive) setRows(list);
    })();
    return () => { alive = false; };
  }, []);

  const refresh = async () => {
    setRows(null);
    const list = await window.storage.getHistory("hs-v1", 100);
    setRows(list);
  };

  const fmtAgo = (iso) => {
    const ms = Date.now() - new Date(iso).getTime();
    const s = Math.floor(ms/1000);
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s/60);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h/24);
    return `${d}d ago`;
  };
  const fmtAbs = (iso) => {
    try { return new Date(iso).toLocaleString(); } catch { return iso; }
  };
  const fmtBytes = (n) => {
    if (n == null) return "—";
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / 1024 / 1024).toFixed(2)} MB`;
  };
  const labelStyle = (label) => {
    const map = {
      "auto":              { bg: "#f3f4f6", fg: "#4b5563" },
      "pre-import":        { bg: "#fef3c7", fg: "#92400e" },
      "pre-recascade":     { bg: "#fee2e2", fg: "#991b1b" },
      "pre-delete-project":{ bg: "#fee2e2", fg: "#991b1b" },
      "pre-restore":       { bg: "#dbeafe", fg: "#1e40af" },
      "safety-block":      { bg: "#fef2f2", fg: "#7f1d1d" },
    };
    return map[label] || { bg: "#f3f4f6", fg: "#4b5563" };
  };

  const doPreview = async (row) => {
    setBusy(true);
    const valStr = await window.storage.getHistoryValue(row.id);
    setBusy(false);
    if (!valStr) { showToast("Could not load snapshot.", { type: "error" }); return; }
    try {
      const parsed = JSON.parse(valStr);
      setPreviewRow(row);
      setPreviewData(parsed);
    } catch {
      showToast("Snapshot is not valid JSON.", { type: "error" });
    }
  };

  const doDownload = async (row) => {
    const valStr = await window.storage.getHistoryValue(row.id);
    if (!valStr) { showToast("Could not load snapshot.", { type: "error" }); return; }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([valStr], { type: "application/json" }));
    const stamp = row.created_at?.replace(/[:.]/g, "-").slice(0,19) || "snapshot";
    a.download = `planar-snapshot-${stamp}.json`;
    a.click();
  };

  const doRestore = async (row) => {
    if (!window.confirm(`Restore snapshot from ${fmtAbs(row.created_at)} (${row.task_count} tasks, ${row.project_count} projects)?\n\nCurrent state will be saved as a 'pre-restore' snapshot first.`)) return;
    setBusy(true);
    try {
      // 1. Snapshot current state with pre-restore label
      if (data) {
        await window.storage.set("hs-v1", JSON.stringify(data), { label: "pre-restore", skipSanity: true });
      }
      // 2. Fetch the snapshot value
      const valStr = await window.storage.getHistoryValue(row.id);
      if (!valStr) { showToast("Could not load snapshot.", { type: "error" }); setBusy(false); return; }
      const parsed = JSON.parse(valStr);
      // 3. Apply — setData will trigger the auto-save useEffect, persisting it to hs-v1
      setData(parsed);
      showToast(`Restored snapshot from ${fmtAgo(row.created_at)}.`, { type: "success", duration: 4000 });
      onClose && onClose();
    } catch (e) {
      console.error("Restore failed:", e);
      showToast("Restore failed — see console.", { type: "error" });
    }
    setBusy(false);
  };

  return (
    <div data-testid="history-panel"
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:9000,
        display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={onClose}>
      <div style={{background:"#fff",border:"1px solid var(--bd2)",borderRadius:10,
        width:"min(900px,96vw)",maxHeight:"86vh",display:"flex",flexDirection:"column",overflow:"hidden"}}
        onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"12px 18px",borderBottom:"1px solid var(--bd)",flexShrink:0}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"var(--amber)",letterSpacing:".07em",textTransform:"uppercase",lineHeight:1,marginBottom:2}}>RECOVERY</div>
            <div style={{fontSize:14,fontWeight:600,color:"var(--txt)"}}>Version History</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn" onClick={refresh} disabled={busy} title="Refresh">↻</button>
            <button className="btn" onClick={onClose}>Close</button>
          </div>
        </div>

        {/* Banner */}
        <div style={{padding:"10px 18px",fontSize:11,color:"var(--mut)",background:"#fafbfc",borderBottom:"1px solid var(--bd)",flexShrink:0}}>
          Snapshots of your data, newest first. Restore reverts to a snapshot; your current state is backed up first as <code style={{background:"#eef2ff",padding:"1px 4px",borderRadius:2,fontSize:10}}>pre-restore</code>.
        </div>

        {/* Body */}
        <div style={{flex:1,overflow:"auto"}}>
          {rows === null ? (
            <div style={{padding:"40px 18px",textAlign:"center",color:"var(--mut)",fontSize:12}}>Loading…</div>
          ) : rows.length === 0 ? (
            <div style={{padding:"40px 18px",textAlign:"center",color:"var(--mut)",fontSize:12}}>
              <div style={{marginBottom:8,fontSize:13,color:"var(--txt)",fontWeight:500}}>No snapshots yet.</div>
              <div>If you've just enabled history, the <code>planar_history</code> table needs to be created in Supabase.<br/>See the setup SQL in the project README. Snapshots will appear here as you edit.</div>
            </div>
          ) : (
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#fafbfc",borderBottom:"1px solid var(--bd)"}}>
                  <th style={{textAlign:"left",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>When</th>
                  <th style={{textAlign:"left",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>Label</th>
                  <th style={{textAlign:"right",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>Projects</th>
                  <th style={{textAlign:"right",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>Tasks</th>
                  <th style={{textAlign:"right",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>Size</th>
                  <th style={{textAlign:"right",padding:"8px 12px",fontWeight:600,color:"var(--mut)",fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r => {
                  const ls = labelStyle(r.label);
                  return (
                    <tr key={r.id} style={{borderBottom:"1px solid var(--bd)"}} data-testid="history-row">
                      <td style={{padding:"8px 12px",color:"var(--txt)"}} title={fmtAbs(r.created_at)}>{fmtAgo(r.created_at)}</td>
                      <td style={{padding:"8px 12px"}}>
                        <span style={{display:"inline-block",padding:"1px 7px",borderRadius:9,fontSize:10,fontWeight:500,background:ls.bg,color:ls.fg}}>{r.label || "auto"}</span>
                      </td>
                      <td style={{padding:"8px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{r.project_count ?? "—"}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{r.task_count ?? "—"}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"var(--mut)"}}>{fmtBytes(r.byte_size)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right"}}>
                        <button className="btn" disabled={busy} onClick={()=>doPreview(r)} style={{marginRight:4,fontSize:10,padding:"2px 7px"}}>Preview</button>
                        <button className="btn" disabled={busy} onClick={()=>doDownload(r)} style={{marginRight:4,fontSize:10,padding:"2px 7px"}}>Download</button>
                        <button className="btn" disabled={busy} onClick={()=>doRestore(r)}
                          style={{fontSize:10,padding:"2px 7px",borderColor:"var(--amber)",color:"var(--amber)"}}>Restore</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* Preview modal */}
        {previewRow && previewData && (
          <div onClick={()=>{setPreviewRow(null);setPreviewData(null);}}
            style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
            <div onClick={e=>e.stopPropagation()}
              style={{background:"#fff",borderRadius:8,width:"min(800px,94vw)",maxHeight:"82vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{padding:"10px 16px",borderBottom:"1px solid var(--bd)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>Snapshot Preview</div>
                  <div style={{fontSize:10,color:"var(--mut)"}}>{fmtAbs(previewRow.created_at)} · {previewRow.label}</div>
                </div>
                <button className="btn" onClick={()=>{setPreviewRow(null);setPreviewData(null);}}>Close</button>
              </div>
              <div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid var(--bd)"}}>
                      <th style={{textAlign:"left",padding:"6px 8px",fontWeight:600,color:"var(--mut)"}}>Project</th>
                      <th style={{textAlign:"right",padding:"6px 8px",fontWeight:600,color:"var(--mut)"}}>Tasks</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Object.entries(previewData.projects || {}).map(([pid, p]) => (
                      <tr key={pid} style={{borderBottom:"1px solid var(--bd)"}}>
                        <td style={{padding:"6px 8px"}}>{p.name || `Project ${pid}`}</td>
                        <td style={{padding:"6px 8px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{p.tasks?.length || 0}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{padding:"10px 16px",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"flex-end",gap:8}}>
                <button className="btn" onClick={()=>doDownload(previewRow)}>Download JSON</button>
                <button className="btn"
                  style={{borderColor:"var(--amber)",color:"var(--amber)"}}
                  onClick={()=>{ const r = previewRow; setPreviewRow(null); setPreviewData(null); doRestore(r); }}>
                  Restore This Snapshot
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ErrorBoundary ─────────────────────────────────────────
// Catches render errors in Gantt/Split view and shows a recovery UI
// instead of a white screen. Without this, any uncaught error in a
// child component tears down the entire React tree.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("[planar] View render error:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:12,background:"var(--bg)",padding:32}}>
          <span style={{fontSize:22}}>⚠️</span>
          <span style={{fontSize:14,fontWeight:600,color:"var(--txt)"}}>This view failed to load</span>
          <span style={{fontSize:12,color:"var(--mut)",maxWidth:360,textAlign:"center"}}>
            {String(this.state.error?.message || this.state.error || "Unknown render error")}
          </span>
          <button className="btn" style={{marginTop:8}} onClick={() => this.setState({hasError:false, error:null})}>
            Try again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── Suggestions queue (email → AI suggestion → approve/dismiss) ───
const SGQ_HEALTH = {
  gray:  {label:"Not Started", dot:"#ffffff", bd:"1.5px solid #d1d5db"},
  yellow:{label:"In Progress", dot:"#c47b00", bd:"none"},
  red:   {label:"Needs Attn.", dot:"#dc2626", bd:"none"},
  green: {label:"Complete",    dot:"#16a34a", bd:"none"},
  paused:{label:"Paused",      dot:"#9ca3af", bd:"none"},
};
const SGQ_HKEYS = ["gray","yellow","red","green","paused"];
const SGQ_AV = ["#4f46e5","#0969da","#16a34a","#c47b00","#9333ea","#0891b2","#dc2626"];
const SGQ_ALLOWED_PATCH = new Set(["health","duration","end","percentComplete","responsibleParty"]);
const SGQ_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function sgqAvatarColor(name) {
  let h = 0; for (const c of String(name||"")) h = (h*31 + c.charCodeAt(0)) >>> 0;
  return SGQ_AV[h % SGQ_AV.length];
}
function sgqInitials(name) {
  const parts = String(name||"").trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}
function sgqConfClass(c) { const n = Number(c||0); return n >= 0.8 ? "hi" : n >= 0.5 ? "mid" : "lo"; }
function sgqFmtDate(s) {
  if (!s) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(s);
  if (!m) return s;
  return SGQ_MONTHS[+m[2] - 1] + " " + (+m[3]);
}
function SgqDot({h}) {
  const m = SGQ_HEALTH[h] || SGQ_HEALTH.gray;
  return <span className="sgq-dot" style={{background: m.dot, border: m.bd !== "none" ? m.bd : "none"}}/>;
}

function sgqChildrenOf(data, pid, parentId) {
  const proj = data && data.projects && data.projects[pid];
  if (!proj) return [];
  return proj.tasks.filter(t => parentId == null ? (t.parentId == null) : (t.parentId === parentId));
}

function sgqCrumbOf(data, pid, path) {
  if (pid == null || !Array.isArray(path) || path.length === 0) return null;
  const proj = data && data.projects && data.projects[pid];
  if (!proj) return null;
  const byId = new Map(proj.tasks.map(t => [t.id, t]));
  const names = path.map(id => byId.get(id) && byId.get(id).name).filter(Boolean);
  if (names.length === 0) return null;
  return { project: proj.name, names };
}

function SgqCrumb({data, pid, path}) {
  const c = sgqCrumbOf(data, pid, path);
  if (!c) return <span style={{color:"#c47b00", fontWeight:600}}>No task selected</span>;
  return (
    <span className="sgq-crumbline">
      {c.project}
      {c.names.map((nm, i) => (
        <React.Fragment key={i}>
          <span className="sgq-arrow">▸</span>{nm}
        </React.Fragment>
      ))}
    </span>
  );
}

/* Cascade picker — row of selects: Project ▸ Phase ▸ … ▸ Task */
function SgqCascadePicker({data, pid, path, ready, onChange}) {
  const projects = (data && data.projects) ? Object.entries(data.projects) : [];
  const selects = [];
  if (pid != null && data && data.projects && data.projects[pid]) {
    let nodes = sgqChildrenOf(data, pid, null);
    let k = 0;
    /* eslint-disable no-constant-condition */
    while (true) {
      const val = path && path[k] != null ? path[k] : null;
      selects.push({ k, nodes, val });
      if (val == null) break;
      const kids = sgqChildrenOf(data, pid, val);
      if (kids.length === 0) break;
      nodes = kids;
      k++;
    }
  }
  return (
    <div className={"sgq-target" + (ready ? "" : " warnrow")}>
      <i className={ready ? "ti ti-map-pin" : "ti ti-help-circle"}/>
      {!ready && pid == null && <span className="sgq-needpick">Pick the task:</span>}
      <select className="sgq-sel"
        value={pid == null ? "" : pid}
        onChange={e => onChange(e.target.value === "" ? null : +e.target.value, [])}>
        <option value="" disabled>Project…</option>
        {projects.map(([k, p]) => <option key={k} value={k}>{p.name}</option>)}
      </select>
      {selects.map(sel => (
        <React.Fragment key={sel.k}>
          <span className="sgq-arrow">▸</span>
          <select className="sgq-sel"
            value={sel.val == null ? "" : sel.val}
            onChange={e => {
              const v = e.target.value === "" ? null : +e.target.value;
              const np = (path || []).slice(0, sel.k);
              if (v != null) np.push(v);
              onChange(pid, np);
            }}>
            <option value="">{sel.k === 0 ? "Phase…" : "↳ refine (optional)"}</option>
            {sel.nodes.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
          </select>
        </React.Fragment>
      ))}
    </div>
  );
}

  if (field === "duration") {

      <div className="sgq-chg">
        <span className="sgq-field">Duration</span>

        <i className="ti ti-arrow-right sgq-toarrow"/>

          value={toVal != null ? toVal : 0}

        <span style={{color:"#8b949e"}}>d</span>
        <span className="sgq-grow"/>
        {onRemove && <span className="sgq-x" title="Don't apply this change" onClick={onRemove}><i className="ti ti-x"/></span>}
      </div>
    );
  }
  if (field === "responsibleParty") {
    return (
      <div className="sgq-chg">
        <span className="sgq-field">Owner</span>
        <span className="sgq-fromval">{fromVal || "—"}</span>
        <i className="ti ti-arrow-right sgq-toarrow"/>
        <input className="sgq-miniinput" type="text" style={{minWidth:140}}
          value={toVal || ""}
          onChange={e => onEditTo(e.target.value)}/>
        <span className="sgq-grow"/>
        {onRemove && <span className="sgq-x" title="Don't apply this change" onClick={onRemove}><i className="ti ti-x"/></span>}

  if (field === "end") {
    return (
      <div className="sgq-chg">

function SuggestionsView({data, updateTask}) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [edits, setEdits] = useState({});           // id -> {project_id, task_path, note_text, patch}
  const [expandedBody, setExpandedBody] = useState({}); // id -> bool

  // Fetch + subscribe
  useEffect(() => {
    const sb = window.__sb;
    if (!sb) { setLoading(false); return; }
    let alive = true;
    (async () => {
      try {
        const { data: list, error } = await sb.from('planar_suggestions')
          .select('*').eq('status', 'pending').order('created_at', { ascending: false });
        if (!alive) return;
        if (!error && list) setRows(list);
      } catch (e) { console.warn("suggestions fetch failed:", e); }
      if (alive) setLoading(false);
    })();
    let channel = null;
    try {
      channel = sb.channel('planar_suggestions_pending')
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'planar_suggestions' }, payload => {
          if (payload && payload.new && payload.new.status === 'pending') {
            setRows(R => [payload.new, ...R.filter(r => r.id !== payload.new.id)]);
          }
        })
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'planar_suggestions' }, payload => {
          if (!payload || !payload.new) return;
          if (payload.new.status !== 'pending') {
            setRows(R => R.filter(r => r.id !== payload.new.id));
          } else {
            setRows(R => R.map(r => r.id === payload.new.id ? payload.new : r));
          }
        })
        .on('postgres_changes', { event:'DELETE', schema:'public', table:'planar_suggestions' }, payload => {
          if (payload && payload.old) setRows(R => R.filter(r => r.id !== payload.old.id));
        })
        .subscribe();
    } catch (e) { console.warn("suggestions subscribe failed:", e); }
    return () => { alive = false; try { if (channel) sb.removeChannel(channel); } catch (e) {} };
  }, []);

  const getEff = (row) => {
    const e = edits[row.id] || {};
    return {
      project_id: ('project_id' in e) ? e.project_id : row.project_id,
      task_path:  ('task_path'  in e) ? e.task_path  : (row.task_path  || []),
      note_text:  ('note_text'  in e) ? e.note_text  : (row.note_text  || ''),
      patch:      ('patch'      in e) ? e.patch      : (row.patch      || {}),
    };
  };
  const patchRow = (id, p) => setEdits(E => ({ ...E, [id]: { ...(E[id] || {}), ...p } }));
  const updatePatchField = (id, field, val) => {
    setEdits(E => {
      const row = rows.find(r => r.id === id);
      const cur = (E[id] && E[id].patch) || (row && row.patch) || {};
      return { ...E, [id]: { ...(E[id] || {}), patch: { ...cur, [field]: val } } };
    });
  };
  // Duration and End date are linked, exactly like the grid: editing one recomputes
  // the other from the task's start, so the card shows the real result before approve.
  const updateDurEnd = (id, field, val, target) => {
    setEdits(E => {
      const row = rows.find(r => r.id === id);
      const cur = (E[id] && E[id].patch) || (row && row.patch) || {};
      const start = target ? target.start : "";
      const next = { ...cur };
      if (field === "duration") {
        const dur = Math.max(0, parseInt(val, 10) || 0);
        next.duration = dur;
        if (start) next.end = calcEnd(start, dur);
      } else {
        next.end = val;
        if (start && val) next.duration = Math.max(0, difBD(start, val) + 1);
      }
      return { ...E, [id]: { ...(E[id] || {}), patch: next } };
    });
  };
  const removePatchField = (id, field) => {
    setEdits(E => {
      const row = rows.find(r => r.id === id);
      const cur = (E[id] && E[id].patch) || (row && row.patch) || {};
      const c = { ...cur }; delete c[field];
      return { ...E, [id]: { ...(E[id] || {}), patch: c } };
    });
  };

  const approve = async (row) => {
    const eff = getEff(row);
    const pid = eff.project_id;
    if (pid == null || !eff.task_path || eff.task_path.length === 0) return;
    const targetId = eff.task_path[eff.task_path.length - 1];
    const proj = data && data.projects && data.projects[pid];
    if (!proj) { console.warn("Approve: project not found", pid); return; }
    const target = proj.tasks.find(t => t.id === targetId);
    if (!target) { console.warn("Approve: task not found", targetId, "in project", pid); return; }
    const dateMatch = row.email_date && /^(\d{4})-(\d{2})-(\d{2})$/.exec(row.email_date);
    const ymd = dateMatch ? row.email_date : new Date().toISOString().slice(0, 10);
    const cleanPatch = {};
    const srcPatch = eff.patch || {};
    for (const k of Object.keys(srcPatch)) {
      if (!SGQ_ALLOWED_PATCH.has(k)) continue;
      const v = srcPatch[k];
      if (v === undefined || v === null || v === "") continue;
      if (target && String(target[k]) === String(v)) continue;  // skip no-op: unchanged from current value
      cleanPatch[k] = v;
    }
    const noteEntry = { id: Date.now(), date: ymd, text: String(eff.note_text || "").trim() };
    const existingNotes = Array.isArray(target.notes) ? target.notes : [];
    const merged = { ...cleanPatch, notes: [...existingNotes, noteEntry] };
    try { updateTask(targetId, merged, pid); }
    catch (e) { console.error("updateTask failed:", e); return; }
    const sb = window.__sb;
    if (sb) {
      try { await sb.from('planar_suggestions').update({ status: 'approved' }).eq('id', row.id); }
      catch (e) { console.warn("mark approved failed:", e); }
    }
    setRows(R => R.filter(r => r.id !== row.id));
    setEdits(E => { const c = { ...E }; delete c[row.id]; return c; });
  };

  const dismiss = async (row) => {
    const sb = window.__sb;
    if (sb) {
      try { await sb.from('planar_suggestions').update({ status: 'dismissed' }).eq('id', row.id); }
      catch (e) { console.warn("mark dismissed failed:", e); }
    }
    setRows(R => R.filter(r => r.id !== row.id));
    setEdits(E => { const c = { ...E }; delete c[row.id]; return c; });
  };

  if (loading) {
    return (
      <div className="sgq" style={{flex:1, overflowY:"auto"}}>
        <div className="sgq-loading">Loading suggestions…</div>
      </div>
    );
  }

  return (
    <div className="sgq" style={{flex:1, overflowY:"auto"}}>
      <div className="sgq-strip">
        <i className="ti ti-mail-forward"/>
        Forwarded work emails become suggested edits. Nothing changes until you approve.
      </div>
      <div className="sgq-wrap">
        {rows.length === 0 ? (
          <div className="sgq-empty">
            <div style={{opacity:.5, marginBottom:14}}><i className="ti ti-inbox" style={{fontSize:46}}/></div>
            <h3>Inbox zero</h3>
            <p>No pending suggestions. Forward a work email to see it appear here.</p>
          </div>
        ) : rows.map(row => {
          const eff = getEff(row);
          const ready = eff.project_id != null && eff.task_path && eff.task_path.length > 0;
          const target = ready
            ? (data && data.projects && data.projects[eff.project_id] &&
               data.projects[eff.project_id].tasks.find(t => t.id === eff.task_path[eff.task_path.length - 1]))
            : null;
          const patchObj = eff.patch || {};
          const patchKeys = Object.keys(patchObj).filter(k =>
            SGQ_ALLOWED_PATCH.has(k) && patchObj[k] !== undefined && patchObj[k] !== null && patchObj[k] !== "");
          // Status, Duration and End date are ALWAYS shown as editable rows (even with no AI change).
          const SGQ_ALWAYS = ["health", "duration", "end"];
          const displayFields = [...SGQ_ALWAYS, ...patchKeys.filter(k => !SGQ_ALWAYS.includes(k))];
          const fromName = row.email_from || "Unknown sender";
          const fromMatch = /^\s*(.*?)\s*<([^>]+)>\s*$/.exec(fromName);
          const displayName = fromMatch ? (fromMatch[1] || fromMatch[2]) : fromName;
          const displayEmail = fromMatch ? fromMatch[2] : "";
          const isOpen = !!expandedBody[row.id];
          return (
            <div key={row.id} className="sgq-card">
              <div className="sgq-chead">
                <div className="sgq-avatar" style={{background: sgqAvatarColor(displayName)}}>{sgqInitials(displayName)}</div>
                <div className="sgq-who">
                  <div className="sgq-subject">{row.email_subject || "(no subject)"}</div>
                  <div className="sgq-frm"><b>{displayName}</b>{displayEmail ? (" · " + displayEmail) : ""}</div>
                </div>
                <div className="sgq-metacol">
                  <span className="sgq-date">{sgqFmtDate(row.email_date)}</span>
                  <span className={"sgq-pill " + sgqConfClass(row.confidence)}>{Math.round((row.confidence || 0) * 100)}% match</span>
                </div>
              </div>
              <div className="sgq-body">
                <div className={"sgq-mailprev" + (isOpen ? " open" : "")}>{row.email_body || "(no body)"}</div>
                <div className="sgq-viewmail" onClick={() => setExpandedBody(X => ({ ...X, [row.id]: !X[row.id] }))}>
                  <i className={isOpen ? "ti ti-chevron-up" : "ti ti-chevron-down"}/>{isOpen ? "Show less" : "View full email"}
                </div>

                <div className="sgq-lbl">Add note</div>
                <textarea className="sgq-note" rows={2} value={eff.note_text}
                  onChange={e => patchRow(row.id, { note_text: e.target.value })}/>

                <div className="sgq-lbl">Task</div>
                <SgqCascadePicker data={data}
                  pid={eff.project_id} path={eff.task_path} ready={ready}
                  onChange={(p, pa) => patchRow(row.id, { project_id: p, task_path: pa })}/>

                {/* Status, Duration and End date always appear here, pre-filled with the
                    task's current value, so they can be set or fixed by hand even when the
                    robot proposed no change. Untouched rows are skipped on approve. */}
                <div className="sgq-changes">
                  <div className="sgq-lbl" style={{marginTop:0}}>Field changes</div>
                  {displayFields.map(k => (
                    <SgqChangeRow key={k} field={k}
                      fromVal={target ? target[k] : undefined}
                      toVal={(k in patchObj) ? patchObj[k] : (target ? target[k] : undefined)}
                      onEditTo={v => ((k === "duration" || k === "end") ? updateDurEnd(row.id, k, v, target) : updatePatchField(row.id, k, v))}
                      onRemove={(k in patchObj) ? () => removePatchField(row.id, k) : null}/>
                  ))}
                </div>

                {(() => {
                  const ADDABLE = [
                    {k:"responsibleParty", label:"Owner", def:(target && target.responsibleParty) || ""},
                  ];
                  const available = ADDABLE.filter(x => !(x.k in patchObj));
                  if (available.length === 0) return null;
                  return (
                    <div className="sgq-addchange">
                      <div className="sgq-lbl">Add change</div>
                      <div className="sgq-addrow">
                        {available.map(x => (
                          <button key={x.k} className="sgq-addbtn"
                            onMouseDown={() => updatePatchField(row.id, x.k, x.def)}>
                            <i className="ti ti-plus"/>{x.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
              <div className="sgq-foot">
                <button className="sgq-actbtn approve" disabled={!ready}
                  onClick={() => approve(row)} title={ready ? "" : "Pick a task first"}>
                  <i className="ti ti-check"/>Approve
                </button>
                <button className="sgq-actbtn reject" onClick={() => dismiss(row)}>
                  <i className="ti ti-x"/>Dismiss
                </button>
                <span className="sgq-hint">{patchKeys.length > 0 ? ("Note + " + patchKeys.length + " change" + (patchKeys.length > 1 ? "s" : "")) : "Note only"}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [data,       setData]       = useState(null);
  const dataRef = useRef(null);
  useEffect(() => { dataRef.current = data; }, [data]);
  const [successorPrompt, setSuccessorPrompt] = useState(null);
  const [notesCtx,   setNotesCtx]   = useState(null);
  const [isMobile,   setIsMobile]   = useState(() => typeof window!=='undefined' && window.innerWidth < 768);
  const [mobMenuOpen, setMobMenuOpen] = useState(false);
  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  const [pdfExportOpen, setPdfExportOpen] = useState(false);
  const [projCtx,    setProjCtx]    = useState(null);
  const [taskCtx,    setTaskCtx]    = useState(null);
  // Task-level clipboard for Ctrl+C / Ctrl+X / Ctrl+V. Held in a ref because the
  // global keydown handler runs in a stable effect and would otherwise capture a
  // stale value. Shape: { mode: "copy"|"cut", tasks: [deep-copied subtree], sourceProjId, sourceRootId }
  const clipboardRef = useRef(null);
  const [, setClipboardTick] = useState(0); // bump to force re-render when clipboard changes (for menu/visual cues)
  const [renameModal, setRenameModal] = useState(null);
  const [edit,       setEdit]       = useState(null);
  const [editStartChar, setEditStartChar] = useState(null);
  const [selectedId,    setSelectedId]    = useState(null);
  const [selRange,      setSelRange]      = useState(null); // {r1,r2,c1,c2} — row/col indices into flatTasks/COLS
  const [selectedColIdx, setSelectedColIdx] = useState(0);
  const [settingsOpen,    setSettingsOpen]    = useState(false);
  const [automationOpen,  setAutomationOpen]  = useState(false);
  const [contactsOpen,    setContactsOpen]    = useState(false);
  const [historyOpen,     setHistoryOpen]     = useState(false);
  const [ganttPPD,   setGanttPPD]   = useState(() => {
    const ganttW = window.innerWidth * 0.46; // 46% goes to Gantt in default split view
    return Math.max(1, Math.floor(ganttW / 365));
  });
  const [gridZoom,   setGridZoom]   = useState(() => data?.gridZoom ?? 1.0);
  const hoverZoneRef = useRef('gantt');
  const fileHandleRef = useRef(null);
  const fileHtmlRef   = useRef(null);
  const fileSaveTimer = useRef(null);
  const [fileLinked,  setFileLinked]  = useState(false);
  const [savePulse,   setSavePulse]   = useState(false);
  const [dlOpen,      setDlOpen]      = useState(false);
  const history      = useRef([]);
  const future       = useRef([]);  // Fix #8: redo stack
  const prevData     = useRef(null);
  const isUndoing    = useRef(false);
  const flatTasksRef = useRef([]);
  const projIdRef    = useRef(null);
  const prevHolKey   = useRef(null);
  const skipHolRecasc = useRef(false);

  // Capture a snapshot AFTER every data change, except undo/redo operations
  useEffect(() => {
    if (!data) return;
    if (isUndoing.current) { isUndoing.current = false; prevData.current = data; return; }
    if (prevData.current !== null) {
      history.current = [...history.current.slice(-49), prevData.current];
      future.current = []; // any new edit invalidates the redo stack
    }
    prevData.current = data;
  }, [data]);


  // One-time migration: recompute end dates to MS Project inclusive convention
  // and normalise predecessor format. Does NOT cascade (preserves manual dates).
  const normalizeToV6 = d => {
    if (d._v6) return d;
    const projects = {};
    Object.entries(d.projects).forEach(([id, proj]) => {
      const tasks = proj.tasks.map(t => ({
        ...t,
        predecessors: normPreds(t.predecessors),
        end: calcEnd(t.start, t.duration),
      }));
      projects[id] = {...proj, tasks: rollupParentDates(tasks)};
    });
    return {...d, projects, _v6: true, healthColStyle: d.healthColStyle || "stoplight",
      settings: d.settings ? {...DEFAULT_SETTINGS, ...d.settings, holidays:{...DEFAULT_HOLIDAYS,...(d.settings.holidays||{})}, customHealth: d.settings.customHealth||[], healthLabelOverrides: d.settings.healthLabelOverrides||{}} : {...DEFAULT_SETTINGS, holidays:{...DEFAULT_HOLIDAYS}}};
  };

  // Ensure any new DEFAULT_HOLIDAYS keys (added in future versions) are merged in
  const ensureHolidays = d => {
    if (!d?.settings) return d;
    const merged = {...DEFAULT_HOLIDAYS, ...(d.settings.holidays||{})};
    return {...d, settings: {...d.settings, holidays: merged}};
  };

  useEffect(() => {
    (async () => {
      // Auto-renumber every project's tasks on load so IDs are always sequential
      const normalizeIds = d => {
        if (!d?.projects) return d;
        const projects = {};
        Object.entries(d.projects).forEach(([pid, proj]) => {
          projects[pid] = {...proj, tasks: renumberTasks(sortByVisualOrder(proj.tasks))};
        });
        return {...d, projects};
      };
      const ensureContacts = d => {
        if (!d?.projects) return d;
        const existing = (d.settings?.contacts || []);
        const existingNames = new Set(existing.map(c => c.name.toLowerCase()));
        const seen = new Set();
        Object.values(d.projects).forEach(proj => {
          (proj.tasks || []).forEach(t => {
            const rp = (t.responsibleParty || '').trim();
            if (rp && !existingNames.has(rp.toLowerCase()) && !seen.has(rp.toLowerCase())) {
              existing.push({ id: Date.now() + existing.length + seen.size, name: rp, email: '' });
              existingNames.add(rp.toLowerCase());
              seen.add(rp.toLowerCase());
            }
          });
        });
        return {...d, settings: {...d.settings, contacts: existing}};
      };
      try {
        const isMobile = window.innerWidth < 768;

      if (!sel || sel.parentId === null) return d;
      const parent = tasks.find(t => t.id === sel.parentId);
      const grandParentId = parent ? parent.parentId : null;

      const updated = tasks.map(t => t.id === sel.id ? {...t, parentId: grandParentId}

        const ids = new Set([rootId]);
        tList.filter(t => t.parentId === rootId && t.id !== sel.id)
             .forEach(c => getSubtreeIds(c.id, tList).forEach(x => ids.add(x)));

      reordered.splice(insertAfter + 1, 0, updated.find(t => t.id === sel.id));

  const insertTaskBelow = useCallback((taskId) => {

      const walk = (parentId) => {
        rawTasks.filter(t => t.parentId === parentId).forEach(t => {
          flatOrder.push(t);
          if (t.isExpanded) walk(t.id);
        });
      };
      walk(null);
      const flatIdx = taskId !== null ? flatOrder.findIndex(t => t.id === taskId) : flatOrder.length - 1;
      const targetTask = flatIdx >= 0 ? flatOrder[flatIdx] : null;
      const newParentId = targetTask ? targetTask.parentId : null;

      const newTask = mkt(0, "", "", "", newParentId);
      const tasks = [...rawTasks];

  const insertTaskAbove = useCallback((taskId) => {
    setData(d => {
      const pid = d.aPid;
      const rawTasks = d.projects[pid].tasks;
      const targetTask = rawTasks.find(t => t.id === taskId);
      if (!targetTask) return d;

      // Same level-pick rule as insertTask: if the visually-previous row is deeper than
      // the target, the new row continues that deeper branch.
      const flatOrder = [];
      const walk = (parentId, level) => {
        rawTasks.filter(t => t.parentId === parentId).forEach(t => {
          flatOrder.push({...t, level});
          if (t.isExpanded) walk(t.id, level + 1);
        });
      };
      walk(null, 0);
      const flatIdx = flatOrder.findIndex(t => t.id === taskId);
      const target  = flatIdx >= 0 ? flatOrder[flatIdx] : null;
      const prev    = flatIdx > 0 ? flatOrder[flatIdx - 1] : null;
      let newParentId;
      if (target === null)                          newParentId = targetTask.parentId;
      else if (prev && prev.level > target.level)   newParentId = prev.parentId;
      else                                          newParentId = target.parentId;

      // New tasks start blank (see insertTask)
      const newTask = mkt(0, "", "", "", newParentId);
      const tasks = [...rawTasks];
      const rawIdx = tasks.findIndex(t => t.id === taskId);
      if (rawIdx === -1) tasks.push(newTask);
      else tasks.splice(rawIdx, 0, newTask);
      return { ...d, projects: { ...d.projects, [pid]: { ...d.projects[pid], tasks: renumberTasks(tasks) } } };
    });
  }, []);

  const addSubtask = useCallback((taskId) => {

      // New tasks start blank (see insertTask)
      const task = mkt(id, "", "", "", taskId);

  const collectSubtreeFor = (rootId, allTasks) => {
    const out = [];

  const cutTaskById = useCallback((taskId) => {
