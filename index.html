// ── SplitView (resizable) ────────────────────────────────
function SplitView(props) {
  const settings = props.data?.settings || DEFAULT_SETTINGS;
  const gridRef      = useRef(null);
  const ganttRef     = useRef(null);
  const lock         = useRef(false);
  const [split, setSplit] = useState(() => settings.defaultSplit || 60);
  const containerRef = useRef(null);
  const divDragging  = useRef(false);
  const [snapMode, setSnapMode]     = useState(() => settings.snapDefault !== false);
  const [dragging,  setDragging]    = useState(false);
  const [hintY,     setHintY]       = useState(0);
  const snapModeRef = useRef(settings.snapDefault !== false);
  useEffect(() => { snapModeRef.current = snapMode; }, [snapMode]);
  // Stay in sync when settings change
  useEffect(() => {
    const v = settings.snapDefault !== false;
    setSnapMode(v);
    snapModeRef.current = v;
  }, [settings.snapDefault]);

  const sync = src => e => {
    if (lock.current) return; lock.current = true;
    const other = src==="grid" ? ganttRef.current : gridRef.current;
    if (other) other.scrollTop = e.currentTarget.scrollTop;
    requestAnimationFrame(() => { lock.current = false; });
  };

  const liveColWidths = useRef(null); // updated by GridView via onColWidths

  const onDividerDown = e => {
    e.preventDefault();
    divDragging.current = true;
    setDragging(true);
    setHintY(e.clientY);
    // Measure the grid's vertical scrollbar width — it sits inside the grid pane and would otherwise cover the last column
    const gridScroll = containerRef.current.querySelector('[data-grid-scroll="1"]');
    const scrollbarW = gridScroll ? Math.max(0, gridScroll.offsetWidth - gridScroll.clientWidth) : 0;
    const snapOffset = scrollbarW + 2; // scrollbar + small breathing room past the column edge
    // Use actual rendered column widths if available, fall back to COLS defaults
    const cw = liveColWidths.current;
    const colEdges = COLS.reduce((acc, c) => { acc.push((acc[acc.length-1]||0) + (cw?.[c.k] ?? c.w)); return acc; }, []);
    const move = ev => {
      if (!divDragging.current) return;
      const rect = containerRef.current.getBoundingClientRect();
      const rawPx = ev.clientX - rect.left;
      let pct;
      if (snapModeRef.current) {
        const nearest = colEdges.reduce((best, edge) =>
          Math.abs(edge - rawPx) < Math.abs(best - rawPx) ? edge : best, colEdges[0]);
        pct = Math.min(82, Math.max(18, (nearest + snapOffset) / rect.width * 100));
      } else {
        pct = Math.min(82, Math.max(18, rawPx / rect.width * 100));
      }
      setSplit(pct);
    };
    const up = () => {
      divDragging.current = false;
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      setTimeout(() => setDragging(false), 5000);
    };
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  };

  return (
    <div ref={containerRef} style={{flex:1,display:"flex",overflow:"hidden",userSelect:"none"}}>
      <div style={{width:`${split}%`,overflow:"hidden",display:"flex",flexShrink:0}}>
        <GridView {...props} scrollRef={gridRef} onScroll={sync("grid")} onColWidths={w => { liveColWidths.current = w; }} />
      </div>
      <div style={{width:1,background:"var(--bd2)",cursor:"col-resize",flexShrink:0,zIndex:20,transition:"background .15s",position:"relative"}}
        onMouseDown={onDividerDown}
        onMouseEnter={e=>e.currentTarget.style.background="var(--blue)"}
        onMouseLeave={e=>e.currentTarget.style.background="var(--bd2)"}>
        {/* Grab zone extends only rightward into the Gantt — never back into the grid */}
        <div style={{position:"absolute",top:0,bottom:0,left:0,right:-9,cursor:"col-resize",zIndex:21}}
          onMouseDown={onDividerDown}
          onMouseEnter={e=>e.currentTarget.parentElement.style.background="var(--blue)"}
          onMouseLeave={e=>e.currentTarget.parentElement.style.background="var(--bd2)"} />
        {dragging && ReactDOM.createPortal(
          <div onMouseDown={e=>e.stopPropagation()}
            style={{position:"fixed", top: 12, right: 16, transform: "none",
              background:"#1f2328", borderRadius:6, padding:"3px 4px",
              display:"flex", gap:3, zIndex:9999, boxShadow:"0 2px 10px rgba(0,0,0,0.25)",
              pointerEvents:"all"}}>
            {[{label:"Snap", val:true},{label:"Free", val:false}].map(({label,val}) => (
              <span key={label}
                onMouseDown={e => { e.stopPropagation(); e.preventDefault(); setSnapMode(val); snapModeRef.current = val; }}
                style={{padding:"3px 10px", borderRadius:4, fontSize:11, cursor:"pointer",
                  fontFamily:"'Inter',system-ui,sans-serif", fontWeight:500, whiteSpace:"nowrap",
                  background: snapMode===val ? "var(--amber)" : "transparent",
                  color: snapMode===val ? "#fff" : "#9ca3af",
                  transition:"background .12s,color .12s"}}>
                {label}
              </span>
            ))}
          </div>,
          document.body
        )}
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex"}}>
        <GanttView tasks={props.tasks} updateTask={props.updateTask} pxPerDay={props.ganttPPD} onZoomChange={props.setGanttPPD} scrollRef={ganttRef} onScroll={sync("gantt")} rolledHealthMap={props.rolledHealthMap} proj={props.proj} onMouseEnter={()=>props.setHoverZone?.('gantt')} selectedId={props.selectedId} setSelectedId={props.setSelectedId} settings={props.data?.settings} />
      </div>
    </div>
  );
}

// ── MasterView ────────────────────────────────────────────
function HealthDropMenu({value, onSelect, onClose}) {
  const [idx, setIdx] = React.useState(() => Math.max(0, HK.indexOf(value)));
  React.useEffect(() => {
    const h = e => {
      if (e.key==="ArrowDown")  { e.stopPropagation(); e.preventDefault(); setIdx(i=>Math.min(HK.length-1,i+1)); }
      else if (e.key==="ArrowUp")    { e.stopPropagation(); e.preventDefault(); setIdx(i=>Math.max(0,i-1)); }
      else if (e.key==="Enter")      { e.stopPropagation(); e.preventDefault(); onSelect(HK[idx]); onClose(); }
      else if (e.key==="Escape" || e.key==="ArrowLeft" || e.key==="ArrowRight") { e.stopPropagation(); e.preventDefault(); onClose(); }
      else if (e.key==="Tab")        { e.preventDefault(); onClose(); }
    };
    document.addEventListener("keydown", h, true);
    const outside = e => { if (!e.target.closest("[data-hmenu]")) onClose(); };
    document.addEventListener("mousedown", outside);
    return () => { document.removeEventListener("keydown", h, true); document.removeEventListener("mousedown", outside); };
  }, [idx, onSelect, onClose]);
  return (
    <div data-hmenu="1" style={{position:"absolute",top:"calc(100% + 2px)",left:0,width:"max-content",
      background:"#fff",border:"1px solid var(--bd2)",borderRadius:6,
      boxShadow:"0 4px 20px rgba(0,0,0,.15)",zIndex:9999,padding:"4px 0",userSelect:"none"}}>
      {HK.map((hk,i) => { const hh=HEALTH[hk]; return (
        <div key={hk} data-hmenu="1" onMouseEnter={()=>setIdx(i)}
          onMouseDown={e=>{e.preventDefault();onSelect(hk);onClose();}}
          style={{padding:"5px 10px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",
            background:i===idx?"var(--surf)":"transparent",transition:"background .1s"}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:hh.dot,border:hh.border,flexShrink:0}} />
          <span style={{fontSize:11,color:"var(--txt)",fontFamily:"'Inter',system-ui,sans-serif",whiteSpace:"nowrap"}}>{hh.label}</span>
        </div>
      ); })}
    </div>
  );
}

const MASTER_COL_DEFS = [
  {k:"project",          label:"Project",      editable:false},
  {k:"id",               label:"ID",           editable:false},
  {k:"parent",           label:"Parent Task",  editable:false},
  {k:"name",             label:"Task",         editable:true},
  {k:"start",            label:"Start",        editable:false},
  {k:"end",              label:"End",          editable:false},
  {k:"duration",         label:"Dur",          editable:true},
  {k:"health",           label:"Status",       editable:true},
  {k:"percentComplete",  label:"% Done",       editable:true},
  {k:"responsibleParty", label:"Owner",        editable:true},
  {k:"predecessors",     label:"Predecessors", editable:false},
  {k:"successors",       label:"Successors",   editable:false},
  {k:"notes",            label:"Notes",        editable:false},
];
const DEFAULT_MASTER_COLS = ["project","id","name","parent","start","end","duration","health","responsibleParty","notes"];
const DEFAULT_MASTER_WIDTHS = {
  project:140, id:36, parent:140, name:220, start:72, end:72,
  duration:52, health:110, percentComplete:60, responsibleParty:100,
  predecessors:180, successors:180, notes:80,
};

function MasterView({data, setData, updateTask, setNotesCtx}) {
  const [localEdit, setLocalEdit] = useState(null);
  const [selCell, setSelCell] = useState(null); // {ri, ci}
  const tableWrapRef = useRef(null);
  const [colPickerOpen, setColPickerOpen] = useState(false);
  const [lvlOpen, setLvlOpen] = useState(false);

  const masterSort = data.masterSort || {col:"health", dir:"asc"};
  const setSort = (col) => {
    if (masterSort.col === col) {
      if (masterSort.dir === "asc") setData(d=>({...d, masterSort:{col, dir:"desc"}}));
      else setData(d=>({...d, masterSort:{col:null, dir:"asc"}}));
    } else {
      setData(d=>({...d, masterSort:{col, dir:"asc"}}));
    }
  };

  const visCols = data.masterCols || DEFAULT_MASTER_COLS;
  const setVisCols = cols => setData(d => ({...d, masterCols: cols}));

  // One-time fix: ensure "parent" sits immediately after "name"
  useEffect(() => {
    if (!visCols.includes('parent') || !visCols.includes('name')) return;
    const ni = visCols.indexOf('name'), pi = visCols.indexOf('parent');
    if (pi === ni + 1) return;
    const next = visCols.filter(k => k !== 'parent');
    next.splice(ni + 1, 0, 'parent');
    setVisCols(next);
  }, []);

  const [dragMCol, setDragMCol] = useState(null);
  const [dragMOver, setDragMOver] = useState(null);
  const reorderMCols = (fromKey, toKey) => {
    if (fromKey === toKey) return;
    const next = [...visCols];
    const fi = next.indexOf(fromKey), ti = next.indexOf(toKey);
    if (fi < 0 || ti < 0) return;
    next.splice(fi, 1);
    next.splice(ti, 0, fromKey);
    setVisCols(next);
  };

  // Level filter: { leafOnly: bool, depths: [0,1,2,3] }
  const DEFAULT_LVL = {leafOnly: false, depths: [0,1,2,3]};
  const lvlFilter = data.masterLevelFilter || DEFAULT_LVL;
  const setLvlFilter = f => setData(d => ({...d, masterLevelFilter: f}));
  const lvlActive = lvlFilter.leafOnly || lvlFilter.depths.length < 4;

  const masterHealthFilter = data.masterHealthFilter ?? true; // true = active only (red+yellow), false = all
  const setHealthFilter = v => setData(d => ({...d, masterHealthFilter: v}));

  const rows = useMemo(() =>
    Object.values(data.projects).flatMap(p => {
      const childIds = new Set(p.tasks.filter(t => t.parentId !== null).map(t => t.parentId));
      return p.tasks
        .filter(t => !masterHealthFilter || (h => h==="red" || h==="yellow")(computeDisplayHealth(t, data.settings)))
        .map(t => {
          let depth = 0, cur = t;
          while (cur && cur.parentId !== null) {
            depth++;
            cur = p.tasks.find(x => x.id === cur.parentId) || null;
          }
          return {...t, projName: p.name, projId: p.id, depth, isLeaf: !childIds.has(t.id)};
        });
    }), [data.projects, masterHealthFilter]);

  const filteredRows = useMemo(() => {
    if (lvlFilter.leafOnly) return rows.filter(r => r.isLeaf);
    return rows.filter(r => lvlFilter.depths.includes(Math.min(r.depth, 3)));
  }, [rows, lvlFilter]);

  const getParentName = (t) => {
    if (!t.parentId) return "—";
    const proj = data.projects[t.projId];
    return proj?.tasks.find(x => x.id === t.parentId)?.name || "—";
  };
  const getPredStr = (t) => {
    const proj = data.projects[t.projId];
    if (!proj) return "";
    return normPreds(t.predecessors).map(p => {
      const pt = proj.tasks.find(x => x.id === p.id);
      return pt ? `${p.id} – ${pt.name}` : "";
    }).filter(Boolean).join("; ");
  };
  const getSuccStr = (t) => {
    const proj = data.projects[t.projId];
    if (!proj) return "";
    return proj.tasks.filter(x =>
      normPreds(x.predecessors).some(p => p.id === t.id)
    ).map(x => `${x.id} – ${x.name}`).join("; ");
  };

  const commit = (t, col, val) => {
    // Only call updateTask if the value actually changed — prevents no-op edits
    // from triggering cascadeDates and shifting successor start dates
    if (col==="duration") {
      const nv = Math.max(0, parseInt(val)||0);
      if (nv !== t.duration) updateTask(t.id, {duration: nv}, t.projId);
    } else if (col==="health") {
      if (val !== t.health) updateTask(t.id, {health: val}, t.projId);
    } else if (col==="percentComplete") {
      const nv = Math.max(0, Math.min(100, parseInt(val)||0));
      if (nv !== (t.percentComplete||0)) updateTask(t.id, {percentComplete: nv}, t.projId);
    } else if (col==="name") {
      if (val.trim() && val.trim() !== t.name) updateTask(t.id, {name: val.trim()}, t.projId);
    } else if (col==="responsibleParty") {
      if (val !== (t.responsibleParty||"")) updateTask(t.id, {responsibleParty: val}, t.projId);
    }
    setLocalEdit(null);
    // Return focus to table wrapper so arrow-key navigation resumes immediately
    setTimeout(() => tableWrapRef.current?.focus({preventScroll:true}), 0);
  };
  const isE = (t, col) => localEdit?.id===t.id && localEdit?.projId===t.projId && localEdit?.col===col;

  const fmtDate = s => {
    if (!s) return "";
    const [y,m,d] = s.split('-');
    return String(+m).padStart(2,'0')+'/'+String(+d).padStart(2,'0')+'/'+y.slice(2);
  };

  const masterGroupBy = data.masterGroupBy || null; // null | "project"
  const setGroupBy = v => setData(d => ({...d, masterGroupBy: v}));

  const HEALTH_ORDER = {red:0, yellow:1, paused:2, gray:3, green:4};

  const sortedRows = useMemo(() => {
    if (!masterSort.col) return filteredRows;
    const {col, dir} = masterSort;
    const mult = dir === "asc" ? 1 : -1;
    return [...filteredRows].sort((a, b) => {
      let av, bv;
      switch(col) {
        case "health":      av = HEALTH_ORDER[computeDisplayHealth(a, data.settings)]??5; bv = HEALTH_ORDER[computeDisplayHealth(b, data.settings)]??5; break;
        case "id":          av = a.id;                           bv = b.id;                         break;
        case "duration":    av = a.duration;                     bv = b.duration;                   break;
        case "percentComplete": av = a.percentComplete||0;       bv = b.percentComplete||0;         break;
        case "start":       av = a.start;                        bv = b.start;                      break;
        case "end":         av = a.end;                          bv = b.end;                        break;
        case "project":     av = (a.projName||"").toLowerCase(); bv = (b.projName||"").toLowerCase(); break;
        case "name":        av = (a.name||"").toLowerCase();     bv = (b.name||"").toLowerCase();   break;
        case "responsibleParty": av=(a.responsibleParty||"").toLowerCase(); bv=(b.responsibleParty||"").toLowerCase(); break;
        case "notes":       av = (a.notes||[]).length;           bv = (b.notes||[]).length;         break;
        default:            av = 0; bv = 0;
      }
      if (av < bv) return -1 * mult;
      if (av > bv) return  1 * mult;
      return 0;
    });
  }, [filteredRows, masterSort]);

  const [colWidths, setColWidths] = useState(() => {
    const saved = data.masterColWidths || {};
    return Object.fromEntries(Object.entries(DEFAULT_MASTER_WIDTHS).map(([k,v]) => [k, saved[k] ?? v]));
  });
  const startResize = (colKey, e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startW = colWidths[colKey];
    const move = ev => setColWidths(w => ({...w, [colKey]: Math.max(40, startW + ev.clientX - startX)}));
    const up = () => {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      document.body.style.cursor = "";
      setColWidths(w => { setData(d => ({...d, masterColWidths: w})); return w; });
    };
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
    document.body.style.cursor = "col-resize";
  };

  const autoSizeMCol = (colKey) => {
    const colDef = MASTER_COL_DEFS.find(c => c.k === colKey);
    if (!colDef) return;
    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    ctx.font = 'bold 10px Inter, system-ui, sans-serif';
    let maxW = ctx.measureText(colDef.label.toUpperCase()).width + 24;
    ctx.font = '12px Inter, system-ui, sans-serif';
    const fmtD = s => { if(!s) return ''; const [y,m,d]=s.split('-'); return `${String(+m).padStart(2,'0')}/${String(+d).padStart(2,'0')}/${(y||'').slice(2)}`; };
    sortedRows.forEach(t => {
      let val = '';
      switch(colKey) {
        case 'project': val = t.projName||''; break;
        case 'id': val = String(t.id); break;
        case 'name': val = t.name||''; break;
        case 'start': val = fmtD(t.start); break;
        case 'end': val = fmtD(t.end); break;
        case 'duration': val = t.duration===0?'—':`${t.duration}d`; break;
        case 'health': val = HEALTH[t.health]?.label||''; break;
        case 'percentComplete': val = `${t.percentComplete||0}%`; break;
        case 'responsibleParty': val = t.responsibleParty||''; break;
        case 'notes': val = t.notes?.length>0?`${t.notes.length} entr`:'+ Add'; break;
        case 'parent': {
          const p=data.projects[t.projId]?.tasks.find(x=>x.id===t.parentId);
          val=p?p.name:'—'; break;
        }
        default: val = String(t[colKey]||'');
      }
      if (val) maxW = Math.max(maxW, ctx.measureText(val).width + 24);
    });
    const nw = Math.max(40, Math.ceil(maxW));
    setColWidths(w => { const n={...w,[colKey]:nw}; setData(d=>({...d,masterColWidths:n})); return n; });
  };

  const activeCols = visCols.map(k => MASTER_COL_DEFS.find(c => c.k === k)).filter(Boolean);
  // When grouped by project, hide the project column — it's redundant with the group header
  const displayCols = masterGroupBy === "project" ? activeCols.filter(c => c.k !== "project") : activeCols;
  const EDITABLE_KEYS = new Set(["name","duration","health","percentComplete","responsibleParty","notes"]);

  const handleTableKey = e => {
    if (localEdit) return; // editing — let the input handle keys
    if (!selCell) return;
    const {ri, ci} = selCell;
    // Alt+Down on health cell — must be checked BEFORE plain ArrowDown
    if (e.altKey && e.key === "ArrowDown") {
      const col = activeCols[ci];
      const t = sortedRows[ri];
      if (col?.k === "health" && t) {
        e.preventDefault();
        setLocalEdit({id: t.id, projId: t.projId, col: "health"});
      }
      return;
    }
    if (e.key === "ArrowDown")  { e.preventDefault(); setSelCell({ri: Math.min(sortedRows.length-1, ri+1), ci}); return; }
    if (e.key === "ArrowUp")    { e.preventDefault(); setSelCell({ri: Math.max(0, ri-1), ci}); return; }
    if (e.key === "ArrowRight") { e.preventDefault(); setSelCell({ri, ci: Math.min(activeCols.length-1, ci+1)}); return; }
    if (e.key === "ArrowLeft")  { e.preventDefault(); setSelCell({ri, ci: Math.max(0, ci-1)}); return; }
    if (e.key === "Escape")     { setSelCell(null); return; }
    if (e.key === "Enter" || e.key === "F2") {
      const col = activeCols[ci];
      const t = sortedRows[ri];
      if (col && t && EDITABLE_KEYS.has(col.k)) {
        e.preventDefault();
        if (col.k === 'notes') { setNotesCtx({taskId:t.id, projectId:t.projId, initChar:null}); return; }
        setLocalEdit({id: t.id, projId: t.projId, col: col.k});
      }
      return;
    }
    // Printable character on a selected editable cell → open edit immediately
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const col = activeCols[ci];
      const t = sortedRows[ri];
      if (!col || !t || !EDITABLE_KEYS.has(col.k)) return;
      if (col.k === 'health') return; // dropdown, use Enter
      if (col.k === 'notes') { e.preventDefault(); setNotesCtx({taskId:t.id, projectId:t.projId, initChar:e.key}); return; }
      const isNum = col.k === 'duration' || col.k === 'percentComplete';
      if (isNum && !/\d/.test(e.key)) return;
      e.preventDefault();
      setLocalEdit({id: t.id, projId: t.projId, col: col.k, initChar: e.key});
    }
  };

  const renderCell = (t, col, ri) => {
    const dispHealth = computeDisplayHealth(t, data.settings);
    const h = HEALTH[dispHealth];
    const ci = activeCols.indexOf(col);
    const isSel = selCell && selCell.ri === ri && selCell.ci === ci;
    const selStyle = isSel ? {outline:"2px solid #2563eb",outlineOffset:"-2px"} : {};
    const onCellClick = () => { setSelCell({ri, ci}); setTimeout(()=>tableWrapRef.current?.focus({preventScroll:true}),0); };
    const isFirstCol = displayCols[0] === col;
    const stripeColor = h.dot === "#ffffff" ? "#d1d5db" : h.dot;
    const tdBase = {padding:"6px 10px", borderBottom:"1px solid var(--bd)", borderRight:"1px solid var(--bd)",
      borderLeft: isFirstCol ? `3px solid ${stripeColor}` : "none",
      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
      width:colWidths[col.k], minWidth:colWidths[col.k], maxWidth:colWidths[col.k], ...selStyle};
    switch(col.k) {
      case "project":
        return <td key={col.k} onClick={onCellClick} style={{...tdBase,color:"#1d4ed8",fontSize:11}}>{t.projName}</td>;
      case "id":
        return <td key={col.k} onClick={onCellClick} style={{...tdBase,color:"var(--mut)",fontSize:11}}>{t.id}</td>;
      case "parent":
        return <td key={col.k} onClick={onCellClick} style={{...tdBase,color:"var(--mut)",fontSize:11}}>{getParentName(t)}</td>;
      case "name":
        return <td key={col.k} style={{...tdBase,cursor:"text"}} onClick={onCellClick} onDoubleClick={()=>setLocalEdit({id:t.id,projId:t.projId,col:"name"})}>
          {isE(t,"name")
            ? <input autoFocus style={{width:"100%",height:"22px",border:"none",borderBottom:"1.5px solid var(--blue)",outline:"none",background:"transparent",fontSize:12,fontFamily:"inherit",color:"var(--txt)",padding:"0 2px"}} defaultValue={localEdit?.initChar ?? t.name}
                onBlur={e=>commit(t,"name",e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")commit(t,"name",e.target.value);if(e.key==="Escape")setLocalEdit(null);}} />
            : <span style={{color:"#1f2328",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",display:"block"}}>{t.name}</span>}
        </td>;
      case "start":
        return <td key={col.k} onClick={onCellClick} style={{...tdBase,fontSize:11,color:"var(--mut)"}}>{fmtDate(t.start)}</td>;
      case "end":
        return <td key={col.k} onClick={onCellClick} style={{...tdBase,fontSize:11,color:"var(--mut)"}}>{fmtDate(t.end)}</td>;
      case "duration":
        return <td key={col.k} style={{...tdBase,cursor:"text"}} onClick={onCellClick} onDoubleClick={()=>setLocalEdit({id:t.id,projId:t.projId,col:"duration"})}>
          {isE(t,"duration")
            ? <input autoFocus style={{width:"100%",height:"22px",border:"none",borderBottom:"1.5px solid var(--blue)",outline:"none",background:"transparent",fontSize:12,fontFamily:"inherit",color:"var(--txt)",padding:"0 2px"}} defaultValue={localEdit?.initChar ?? t.duration} onBlur={e=>commit(t,"duration",e.target.value)} onKeyDown={e=>{if(e.key==="Enter")commit(t,"duration",e.target.value);if(e.key==="Escape")setLocalEdit(null);}} />
            : <span style={{color:"var(--mut)"}}>{t.duration===""||t.duration==null?"":t.duration===0?"—":`${t.duration}d`}</span>}
        </td>;
      case "health":
        return <td key={col.k} data-hmenu="1" onClick={onCellClick}
          onDoubleClick={()=>setLocalEdit({id:t.id,projId:t.projId,col:"health"})}
          style={{...tdBase,cursor:"default",position:"relative",
            overflow:isE(t,"health")?"visible":"hidden",
            zIndex:isE(t,"health")?50:"auto"}}>
          {isE(t,"health") && <HealthDropMenu
            value={t.health}
            onSelect={val=>commit(t,"health",val)}
            onClose={()=>setLocalEdit(null)} />}
          <span style={{background:h.bar,borderRadius:999,
            padding:"3px 8px",fontSize:11,display:"inline-flex",alignItems:"center",gap:4,
            color:HDARK[dispHealth]||"#374151",fontWeight:500,whiteSpace:"nowrap",maxWidth:"100%"}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:h.dot==="#ffffff"?"#d1d5db":h.dot,flexShrink:0}} />{h.label}
          </span>
        </td>;
      case "percentComplete":
        return <td key={col.k} style={{...tdBase,cursor:"text"}} onClick={onCellClick} onDoubleClick={()=>setLocalEdit({id:t.id,projId:t.projId,col:"percentComplete"})}>
          {isE(t,"percentComplete")
            ? <input autoFocus style={{width:"100%",height:"22px",border:"none",borderBottom:"1.5px solid var(--blue)",outline:"none",background:"transparent",fontSize:12,fontFamily:"inherit",color:"var(--txt)",padding:"0 2px"}} defaultValue={localEdit?.initChar ?? (t.percentComplete||0)} onBlur={e=>commit(t,"percentComplete",e.target.value)} onKeyDown={e=>{if(e.key==="Enter")commit(t,"percentComplete",e.target.value);if(e.key==="Escape")setLocalEdit(null);}} />
            : <span style={{color:"var(--mut)"}}>{t.percentComplete||0}%</span>}
        </td>;
      case "responsibleParty":
        return <td key={col.k} style={{...tdBase,cursor:"text"}} onClick={onCellClick} onDoubleClick={()=>setLocalEdit({id:t.id,projId:t.projId,col:"responsibleParty"})}>
          {isE(t,"responsibleParty")
            ? <ContactPicker
                value={localEdit?.initChar != null ? localEdit.initChar : (t.responsibleParty||"")}
                contacts={data.settings?.contacts||[]}
                onCommit={(name, newContact) => {
                  if (newContact) {
                    setData(d => ({...d, settings:{...d.settings, contacts:[...(d.settings?.contacts||[]), {id:Date.now(), ...newContact}]}}));
                  }
                  commit(t,"responsibleParty",name);
                }}
                onCancel={()=>setLocalEdit(null)}
              />
            : <span style={{color:"var(--txt)"}}>{t.responsibleParty||<span style={{color:"var(--bd2)"}}>—</span>}</span>}
        </td>;
      case "predecessors": {
        const _proj = data.projects[t.projId];
        const _preds = normPreds(t.predecessors);
        const _getName = id => _proj?.tasks.find(x=>x.id===id)?.name ?? `#${id}`;
        const _ds = {fontSize:12,display:"flex",alignItems:"center",overflow:"hidden",padding:0,minHeight:18};
        return <td key={col.k} style={{...tdBase,padding:"3px 6px"}}>
          {_preds.length ? <DepCell items={_preds} renderLabel={p=>fmtPreds([p])} renderName={p=>_getName(p.id)} s={_ds} /> : <span style={{color:"var(--bd2)"}}>—</span>}
        </td>;
      }
      case "successors": {
        const _proj = data.projects[t.projId];
        const _succs = _proj ? _proj.tasks.filter(x=>normPreds(x.predecessors).some(p=>p.id===t.id)) : [];
        const _ds = {fontSize:12,display:"flex",alignItems:"center",overflow:"hidden",padding:0,minHeight:18};
        return <td key={col.k} style={{...tdBase,padding:"3px 6px"}}>
          {_succs.length ? <DepCell items={_succs} renderLabel={x=>String(x.id)} renderName={x=>x.name} s={_ds} /> : <span style={{color:"var(--bd2)"}}>—</span>}
        </td>;
      }
      case "notes": {
        const noteList = [...(t.notes||[])].reverse();
        const visible = noteList.slice(0,2);
        const extra = noteList.length - 2;
        const fmtNoteDate = s => { try { const [y,m,d]=(s||"").split("-"); return d?`${+m}/${+d}/${(y||"").slice(2)}`:s; } catch{return s;} };
        return <td key={col.k} style={{...tdBase,whiteSpace:"normal",verticalAlign:"top",cursor:"pointer",minWidth:colWidths[col.k]}}
          onClick={e=>{onCellClick();setNotesCtx({taskId:t.id,projectId:t.projId});}}>
          {noteList.length===0
            ? <span style={{color:"var(--bd2)",fontSize:11}}>+ Add</span>
            : <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {visible.map(n=>(
                  <div key={n.id} style={{display:"flex",alignItems:"baseline",gap:5,lineHeight:1.4}}>
                    <span style={{fontSize:10,color:"var(--mut)",fontFamily:"inherit",flexShrink:0}}>{fmtNoteDate(n.date)}</span>
                    <span style={{fontSize:11,color:"var(--mut)",flexShrink:0}}>|</span>
                    <span style={{fontSize:11,color:"#374151"}}>{n.text}</span>
                  </div>
                ))}
                {extra>0 && <span style={{fontSize:10,color:"#1d4ed8",fontWeight:500}}>+{extra} more…</span>}
              </div>
          }
        </td>;
      }
      default: return <td key={col.k} style={tdBase} />;
    }
  };

  return (
    <div style={{flex:1,overflow:"auto",padding:16}}>
      {/* Header bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <span style={{color:"var(--amber)",fontWeight:600,fontSize:13,letterSpacing:".08em"}}>TASK REPORT</span>
        <span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:8,padding:"1px 8px",fontSize:10}}>{filteredRows.length}</span>

        {/* Force Recascade — strips all pins and reruns cascade, saves to Supabase */}
        <button title="Strip all pinned dates and recalculate everything from predecessor logic"
          className="btn"
          style={{display:"flex",alignItems:"center",gap:5,fontSize:11,padding:"3px 9px"}}
          onClick={()=>{
            // Guardrail: confirm + snapshot before destructive recascade
            if (!window.confirm("Strip all pinned dates across all projects and recalculate from predecessor logic?\n\nA backup snapshot will be saved — you can restore from Version History if needed.")) return;
            setData(d => {
              try { window.storage.set("hs-v1", JSON.stringify(d), { label: "pre-recascade", skipSanity: true }); } catch {}
              HOLIDAY_SET = buildHolidaySet(d.settings?.holidays || DEFAULT_HOLIDAYS);
              const newProjects = {};
              Object.entries(d.projects).forEach(([pid, proj]) => {
                let tasks = proj.tasks.map(({pinnedStart, _pinStart, __wasDirectEdit, ...t}) => t);
                tasks = cascadeDates(tasks);
                tasks = rollupParentDates(tasks);
                newProjects[pid] = {...proj, tasks};
              });
              return {...d, _pinnedClean: true, projects: newProjects};
            });
          }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Recascade
        </button>

        {/* Health filter pill */}
        <button onClick={()=>setHealthFilter(!masterHealthFilter)}
          style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:12,
            fontSize:11,fontFamily:"inherit",cursor:"pointer",fontWeight:500,transition:"all .12s",
            border: masterHealthFilter?"1px solid #f59e0b":"1px solid var(--bd2)",
            background: masterHealthFilter?"#fef3c7":"var(--surf)",
            color: masterHealthFilter?"#92400e":"var(--mut)"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:masterHealthFilter?"#f59e0b":"var(--bd2)",flexShrink:0}} />
          {masterHealthFilter ? "In Progress + Needs Attn." : "All Statuses"}
          <svg width="8" height="8" viewBox="0 0 10 10" style={{marginLeft:1,opacity:.6}}>
            <line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" strokeWidth="1.5"/>
            <line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" strokeWidth="1.5"/>
          </svg>
        </button>

        {/* Group by */}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,marginRight:6,flexShrink:0}}>
          <span style={{fontSize:10,color:"var(--mut)",fontWeight:500,letterSpacing:".04em",whiteSpace:"nowrap"}}>Group by</span>
          <div style={{display:"flex",border:"1px solid var(--bd2)",borderRadius:5,overflow:"hidden"}}>
          {[{v:null,l:"None"},{v:"project",l:"Project"}].map(opt=>(
            <span key={String(opt.v)} onClick={()=>setGroupBy(opt.v)}
              style={{padding:"3px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",
                background:masterGroupBy===opt.v?"var(--amber)":"transparent",
                color:masterGroupBy===opt.v?"#fff":"var(--mut)",
                transition:"background .12s,color .12s",fontWeight:masterGroupBy===opt.v?600:400}}>
              {opt.l}
            </span>
          ))}
          </div>
        </div>

        {/* Level filter */}
        <div style={{position:"relative",marginRight:6}}>
          {lvlOpen && <div style={{position:"fixed",inset:0,zIndex:98}} onClick={()=>setLvlOpen(false)} />}
          <button className={"btn"+(lvlOpen?" act":lvlActive?" act":"")} onClick={()=>setLvlOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
            Show {lvlActive && <span style={{width:5,height:5,borderRadius:"50%",background:"var(--amber)",flexShrink:0}} />}
            <span style={{fontSize:8,opacity:.7}}>▾</span>
          </button>
          {lvlOpen && (
            <div style={{position:"absolute",top:"calc(100% + 4px)",right:0,background:"#fff",border:"1px solid var(--bd2)",
              borderRadius:7,boxShadow:"0 4px 16px rgba(0,0,0,.12)",zIndex:99,padding:"8px 4px",minWidth:176}}
              onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:9,fontWeight:700,color:"var(--mut)",letterSpacing:".08em",textTransform:"uppercase",padding:"0 10px 6px",borderBottom:"1px solid var(--bd)",marginBottom:4}}>Which tasks to show</div>

              {/* Leaf only quick toggle */}
              <label style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer",borderRadius:4,
                background:lvlFilter.leafOnly?"#eef2ff":"transparent",transition:"background .1s"}}
                onMouseEnter={e=>{if(!lvlFilter.leafOnly)e.currentTarget.style.background="var(--surf)";}}
                onMouseLeave={e=>{if(!lvlFilter.leafOnly)e.currentTarget.style.background="transparent";}}>
                <input type="checkbox" checked={lvlFilter.leafOnly}
                  onChange={e=>setLvlFilter({...lvlFilter,leafOnly:e.target.checked})}
                  style={{accentColor:"var(--amber)",width:12,height:12,flexShrink:0}} />
                <div>
                  <div style={{fontSize:12,color:"var(--txt)",fontWeight:500}}>Action items only</div>
                  <div style={{fontSize:10,color:"var(--mut)"}}>Hide phases and section headers</div>
                </div>
              </label>

              <div style={{height:1,background:"var(--bd)",margin:"4px 0"}} />
              <div style={{fontSize:9,color:"var(--mut)",padding:"4px 10px 2px",letterSpacing:".04em"}}>OR BY OUTLINE LEVEL</div>

              {[{d:0,label:"Top-level phases",sub:"Outline level 1"},
                {d:1,label:"Subtasks",sub:"Outline level 2"},
                {d:2,label:"Sub-subtasks",sub:"Outline level 3"},
                {d:3,label:"Deeper nesting",sub:"Level 4 and below"},
              ].map(({d,label,sub}) => {
                const on = lvlFilter.depths.includes(d);
                return (
                  <label key={d} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",cursor:"pointer",
                    borderRadius:4,opacity:lvlFilter.leafOnly?0.4:1,transition:"background .1s"}}
                    onMouseEnter={e=>{if(!lvlFilter.leafOnly)e.currentTarget.style.background="var(--surf)";}}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <input type="checkbox" checked={on} disabled={lvlFilter.leafOnly}
                      onChange={e=>setLvlFilter({...lvlFilter,depths:e.target.checked?[...lvlFilter.depths,d]:lvlFilter.depths.filter(x=>x!==d)})}
                      style={{accentColor:"var(--amber)",width:12,height:12,flexShrink:0}} />
                    <div>
                      <div style={{fontSize:12,color:"var(--txt)"}}>{label}</div>
                      <div style={{fontSize:10,color:"var(--mut)"}}>{sub}</div>
                    </div>
                  </label>
                );
              })}

              <div style={{borderTop:"1px solid var(--bd)",marginTop:4,padding:"6px 10px 2px"}}>
                <span style={{fontSize:10,color:"var(--mut)",cursor:"pointer",textDecoration:"underline"}}
                  onClick={()=>setLvlFilter({...DEFAULT_LVL})}>Show all</span>
              </div>
            </div>
          )}
        </div>

        {/* Column picker */}
        <div style={{position:"relative"}}>
          {colPickerOpen && <div style={{position:"fixed",inset:0,zIndex:98}} onClick={()=>setColPickerOpen(false)} />}
          <button className={"btn"+(colPickerOpen?" act":"")} onClick={()=>setColPickerOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
            Columns <span style={{fontSize:8,opacity:.7}}>▾</span>
          </button>
          {colPickerOpen && (
            <div style={{position:"absolute",top:"calc(100% + 4px)",right:0,background:"#fff",border:"1px solid var(--bd2)",
              borderRadius:7,boxShadow:"0 4px 16px rgba(0,0,0,.12)",zIndex:99,padding:"8px 4px",minWidth:168}}
              onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:9,fontWeight:700,color:"var(--mut)",letterSpacing:".08em",textTransform:"uppercase",padding:"0 10px 6px",borderBottom:"1px solid var(--bd)",marginBottom:4}}>Show / Hide Columns</div>
              {MASTER_COL_DEFS.map(col => {
                const on = visCols.includes(col.k);
                return (
                  <label key={col.k} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",cursor:"pointer",borderRadius:4,transition:"background .1s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--surf)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <input type="checkbox" checked={on}
                      onChange={e=>setVisCols(e.target.checked ? [...visCols,col.k] : visCols.filter(k=>k!==col.k))}
                      style={{accentColor:"var(--amber)",width:12,height:12,flexShrink:0}} />
                    <span style={{fontSize:12,color:"var(--txt)"}}>{col.label}</span>
                  </label>
                );
              })}
              <div style={{borderTop:"1px solid var(--bd)",marginTop:4,paddingTop:6,padding:"6px 10px 2px"}}>
                <span style={{fontSize:10,color:"var(--mut)",cursor:"pointer",textDecoration:"underline"}}
                  onClick={()=>setVisCols([...DEFAULT_MASTER_COLS])}>Reset to default</span>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Table */}
      <div ref={tableWrapRef} style={{overflowX:"auto",outline:"none"}} tabIndex={0} onKeyDown={handleTableKey}
        onBlur={e=>{ if (!e.currentTarget.contains(e.relatedTarget)) setSelCell(null); }}>
      <table style={{borderCollapse:"collapse",tableLayout:"fixed",
        width:activeCols.reduce((s,c)=>s+(colWidths[c.k]||100),0),fontSize:12}}>
        <thead>
          <tr>
            {displayCols.map(col => {
              const isActive = masterSort.col === col.k;
              const sortable = ["project","id","name","start","end","duration","health","percentComplete","responsibleParty","notes"].includes(col.k);
              return (
              <th key={col.k}
                draggable
                onDragStart={e=>{e.dataTransfer.effectAllowed="move";setDragMCol(col.k);}}
                onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";setDragMOver(col.k);}}
                onDragLeave={()=>setDragMOver(null)}
                onDrop={e=>{e.preventDefault();reorderMCols(dragMCol,col.k);setDragMCol(null);setDragMOver(null);}}
                onDragEnd={()=>{setDragMCol(null);setDragMOver(null);}}
                onClick={sortable&&dragMCol===null ? ()=>setSort(col.k) : undefined}
                style={{padding:"6px 10px",textAlign:"left",color:"var(--mut)",fontSize:10,
                  textTransform:"uppercase",fontWeight:600,letterSpacing:".06em",
                  borderBottom:"1px solid var(--bd2)",borderRight:"1px solid var(--bd)",
                  borderLeft:dragMOver===col.k&&dragMCol!==col.k?"2px solid var(--blue)":"2px solid transparent",
                  whiteSpace:"nowrap",
                  width:colWidths[col.k],minWidth:colWidths[col.k],maxWidth:colWidths[col.k],
                  position:"relative",userSelect:"none",overflow:"hidden",
                  cursor:"grab",opacity:dragMCol===col.k?0.4:1,
                  background:"transparent",transition:"border-color .1s,opacity .1s"}}>
                <span style={{display:"inline-flex",alignItems:"center",gap:4}}>
                  {col.label}
                  {sortable && (
                    <span style={{fontSize:9,color:isActive?"var(--txt)":"var(--bd2)",lineHeight:1,flexShrink:0}}>
                      {isActive ? (masterSort.dir==="asc"?"↑":"↓") : "↕"}
                    </span>
                  )}
                </span>
                <div
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();startResize(col.k,e);}}
                  onClick={e=>e.stopPropagation()}
                  onDoubleClick={e=>{e.stopPropagation();autoSizeMCol(col.k);}}
                  style={{position:"absolute",right:0,top:0,bottom:0,width:6,cursor:"col-resize",zIndex:2,
                    background:"transparent",transition:"background .12s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(79,70,229,0.25)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"} />
              </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {masterGroupBy === "project" ? (() => {
            const groups = {};
            sortedRows.forEach(t => { (groups[t.projName] = groups[t.projName]||[]).push(t); });
            return Object.entries(groups).flatMap(([projName, gRows]) => [
              <tr key={`grp-${projName}`}>
                <td colSpan={displayCols.length} style={{
                  padding:"10px 12px 8px", borderBottom:"1px solid var(--bd)",
                  background:"#f0f0f5", borderLeft:"4px solid var(--amber)"}}>
                  <span style={{fontSize:15,fontWeight:700,color:"var(--txt)",letterSpacing:"-.01em"}}>{projName}</span>
                  <span style={{marginLeft:8,fontSize:10,color:"var(--mut)",background:"#dbeafe",color:"#1d4ed8",borderRadius:8,padding:"1px 7px",verticalAlign:"middle"}}>{gRows.length}</span>
                </td>
              </tr>,
              ...gRows.map((t,gri) => {
                const ri = sortedRows.indexOf(t);
                return (
                <tr key={`${t.projId}-${t.id}`} style={{background:t.rowColor||(gri%2?"#f8fafc":"var(--bg)")}}>
                  {displayCols.map(col => renderCell(t, col, ri))}
                </tr>
                );
              })
            ]);
          })()
          : sortedRows.map((t, ri) => (
            <tr key={`${t.projId}-${t.id}`} style={{background:t.rowColor||(ri%2?"#f8fafc":"var(--bg)")}}>
              {displayCols.map(col => renderCell(t, col, ri))}
            </tr>
          ))}
          {rows.length===0 && (
            <tr><td colSpan={displayCols.length} style={{padding:40,textAlign:"center",color:"var(--mut)",fontSize:12,borderBottom:"1px solid var(--bd)"}}>
              {filteredRows.length===0&&rows.length>0?"No tasks match the current filter.":"No tasks in this project yet."}
            </td></tr>
          )}
        </tbody>
      </table>
      </div>
    </div>
  );
}


// ── PDF helpers ──────────────────────────────────────────
const PAGE_SIZES = {
  letter:  {label:"Letter (8.5 × 11 in)",  w:8.5,  h:11,    css:"letter",    short:"Letter"},
  legal:   {label:"Legal (8.5 × 14 in)",   w:8.5,  h:14,    css:"legal",     short:"Legal"},
  tabloid: {label:"Tabloid (11 × 17 in)",  w:11,   h:17,    css:"11in 17in", short:"11×17"},
  a4:      {label:"A4 (8.27 × 11.69 in)", w:8.27, h:11.69, css:"A4",        short:"A4"},
};
function buildGanttSVG(projects, svgWidth, orientation, opts = {}) {
  const noLabels = !!opts.noLabels;
  const ROW_H=18, LABEL_W=noLabels ? 0 : (orientation==="landscape"?200:155);
  const ganttW=svgWidth-LABEL_W;
  const pd=s=>new Date(s+"T12:00:00"), fd=d=>d.toISOString().slice(0,10);
  const allTasks=projects.flatMap(p=>p.tasks);
  if(!allTasks.length) return "";
  const dates=allTasks.flatMap(t=>[t.start,t.end]).filter(Boolean).sort();
  const minD=dates[0], maxD=dates[dates.length-1];
  const totalDays=Math.ceil((pd(maxD)-pd(minD))/86400000)+2;
  const ppd=ganttW/totalDays;
  const xOf=d=>LABEL_W+Math.round((pd(d)-pd(minD))/86400000*ppd);
  const getDepth=(tasks,id)=>{let dep=0,t=tasks.find(x=>x.id===id);while(t&&t.parentId!==null){dep++;t=tasks.find(x=>x.id===t.parentId);}return Math.min(dep,3);};
  const HC={gray:"#94a3b8",yellow:"#d97706",red:"#dc2626",green:"#16a34a",paused:"#9ca3af"};
  // Build full month list with date metadata for adaptive filtering
  const months=[], cur2=new Date(pd(minD));cur2.setDate(1);
  while(cur2<=pd(maxD)){
    months.push({x:xOf(fd(cur2)), mo:cur2.getMonth(), yr:cur2.getFullYear(),
      label:cur2.toLocaleDateString("en-US",{month:"short",year:"2-digit"})});
    cur2.setMonth(cur2.getMonth()+1);
  }
  // Adaptive label density — skip labels that would overlap (~28px each at 7.5px font)
  const monthPx=ppd*30.4;
  const visibleMonths=monthPx>=26?months:monthPx>=13?months.filter(m=>[0,2,4,6,8,10].includes(m.mo)):monthPx>=7?months.filter(m=>[0,3,6,9].includes(m.mo)):months.filter(m=>m.mo===0);
  const yearMarkers=months.filter(m=>m.mo===0);
  const HEADER_H=22, svgH=HEADER_H+ROW_H*allTasks.length;
  const rows=allTasks.map((t,i)=>{
    const y=HEADER_H+i*ROW_H, bg=i%2?"#f6f6f6":"#fff";
    const bx=xOf(t.start), bw=Math.max(3,Math.round((pd(t.end)-pd(t.start))/86400000*ppd));
    const color=HC[t.health]||"#94a3b8";
    const isMilestone=t.duration===0;
    const proj=projects.find(p=>p.tasks.some(x=>x.id===t.id));
    const depth=proj?getDepth(proj.tasks,t.id):0;
    const isParent=proj?proj.tasks.some(x=>x.parentId===t.id):false;
    const labelHtml = noLabels ? "" :
      (() => {
        const indent=depth*8, nameX=4+indent;
        const maxCh=Math.floor((LABEL_W-nameX-4)/5.2);
        const nameStr=t.name.length>maxCh?t.name.slice(0,maxCh-1)+"…":t.name;
        const fw=depth===0?"bold":depth===1?"600":"normal", fs=depth===0?9:depth===1?8.5:8;
        return `<text x="${nameX}" y="${y+ROW_H*0.68}" font-size="${fs}" font-weight="${fw}" fill="#1a1a1a" font-family="Arial,sans-serif">${escapeHtml(nameStr)}</text>
<line x1="${LABEL_W}" y1="${y}" x2="${LABEL_W}" y2="${y+ROW_H}" stroke="#e0e0e0" stroke-width="0.5"/>`;
      })();
    const barY=y+ROW_H*0.22, barH=ROW_H*0.55, midY=y+ROW_H*0.5;
    return `<rect x="0" y="${y}" width="${svgWidth}" height="${ROW_H}" fill="${bg}"/>
${labelHtml}
${isMilestone?`<polygon points="${bx},${midY-5} ${bx+5},${midY} ${bx},${midY+5} ${bx-5},${midY}" fill="${color}"/>`
:isParent?`<rect x="${bx}" y="${barY}" width="${bw}" height="${barH*0.55}" fill="${color}" opacity="0.9"/>
<polygon points="${bx},${barY+barH*0.55} ${bx+5},${barY+barH}" fill="${color}" opacity="0.9"/>
<polygon points="${bx+bw},${barY+barH*0.55} ${bx+bw-5},${barY+barH}" fill="${color}" opacity="0.9"/>`
:`<rect x="${bx}" y="${barY}" width="${bw}" height="${barH}" rx="2" fill="${color}" opacity="0.85"/>`}`;
  }).join("");
  // Grid lines every month (subtle), labels only at computed density, year boundaries emphasized
  const gridLines=months.map(m=>`<line x1="${m.x}" y1="${HEADER_H}" x2="${m.x}" y2="${svgH}" stroke="${m.mo===0?'#bbb':'#eee'}" stroke-width="${m.mo===0?0.8:0.4}"/>`).join("")
    +visibleMonths.map(m=>`<text x="${m.x+3}" y="15" font-size="7.5" fill="#bbb" font-family="Arial,sans-serif">${m.label}</text>`).join("")
    +(monthPx<26?yearMarkers.map(m=>`<line x1="${m.x}" y1="0" x2="${m.x}" y2="${HEADER_H}" stroke="#666" stroke-width="1"/>`).join(""):"");
  const taskHeaderText = noLabels ? "" : `<text x="4" y="15" font-size="8" font-weight="bold" fill="#fff" font-family="Arial,sans-serif">TASK</text>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${svgH}" style="width:100%;display:block;border:1px solid #e8e8e8">
<rect width="${svgWidth}" height="${svgH}" fill="#fff"/>
<rect x="0" y="0" width="${svgWidth}" height="${HEADER_H}" fill="#1a1a1a"/>
${taskHeaderText}
${gridLines}${rows}</svg>`;
}

function buildPDFHtml(cfg, data, forPreview) {
  const projs = Object.values(data.projects);
  const selProjs = projs.filter(p => cfg.selProjects.includes(String(p.id)));
  const COL_DEFS = [
    {k:"id",w:20},{k:"name",w:null},{k:"start",w:42},{k:"end",w:42},
    {k:"duration",w:28},{k:"health",w:72},{k:"percentComplete",w:36},
    {k:"responsibleParty",w:64},{k:"predecessors",w:36},
  ];
  const COL_LABELS = {id:"ID",name:"Task Name",start:"Start",end:"End",duration:"Dur",health:"Status",percentComplete:"%",responsibleParty:"Owner",predecessors:"Pred"};
  const colDefs = COL_DEFS.filter(c => cfg.columns.includes(c.k));
  const HC = {gray:{l:"Not Started",c:"#94a3b8"},yellow:{l:"In Progress",c:"#d97706"},red:{l:"Needs Attn.",c:"#dc2626"},green:{l:"Complete",c:"#16a34a"},paused:{l:"Paused",c:"#9ca3af"}};
  const fmtD = s => { if(!s) return ""; const [y,m,d]=s.split("-"); return String(+m).padStart(2,'0')+'/'+String(+d).padStart(2,'0')+'/'+y.slice(2); };
  const getDepth = (tasks,id) => {let dep=0,t=tasks.find(x=>x.id===id);while(t&&t.parentId!==null){dep++;t=tasks.find(x=>x.id===t.parentId);}return Math.min(dep,3);};
  const cellVal = (t,k,tasks) => {
    switch(k){
      case "start": case "end": return fmtD(t[k]);
      case "duration": return t.duration===0?"—":`${t.duration}d`;
      case "percentComplete": return `${t.percentComplete||0}%`;
      case "predecessors": return (t.predecessors||[]).map(p=>p.id||p).join(", ");
      case "health":{const h=HC[t.health]||{l:t.health,c:"#94a3b8"};return `<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${h.c};flex-shrink:0;display:inline-block"></span>${escapeHtml(h.l)}</span>`;}
      case "name":{const dep=getDepth(tasks,t.id);const ind=dep*14;const fw=dep===0?700:dep===1?600:400;const fs=dep===0?10.5:dep===1?10:9.5;return `<span style="padding-left:${ind}px;font-weight:${fw};font-size:${fs}px">${escapeHtml(t.name)}</span>`;}
      default: return escapeHtml(t[k]);
    }
  };
  const isLand=cfg.orientation==="landscape";
  const ps=PAGE_SIZES[cfg.pageSize]||PAGE_SIZES.letter;
  const pgW=isLand?ps.h:ps.w, pgR=isLand?ps.w:ps.h;
  const contentW=pgW-parseFloat(cfg.margins.left||0.75)-parseFloat(cfg.margins.right||0.75);
  const contentPx=Math.max(300,Math.round(contentW*96));

  let bodyHtml="";
  if(cfg.includeGantt) {
    // Side-by-side: grid on left, Gantt timeline on right — like MS Project / Excel split view
    selProjs.forEach(proj=>{
      let tasks=[...proj.tasks];
      if(cfg.healthFilter==="active") tasks=tasks.filter(t=>t.health==="yellow"||t.health==="red");
      if(cfg.healthFilter==="complete") tasks=tasks.filter(t=>t.health==="green");
      const thCols=colDefs.map(c=>`<th${c.w?` style="width:${c.w}px"`:""}>${COL_LABELS[c.k]}</th>`).join("");
      const rows=tasks.map((t,i)=>{
        const cells=colDefs.map(c=>`<td class="c-${c.k}">${cellVal(t,c.k,proj.tasks)}</td>`).join("");
        return `<tr class="${i%2?"alt":""}">${cells}</tr>`;
      }).join("");
      // Filter the project for Gantt to match the table's task list
      const ganttProj={...proj, tasks};
      // Allocate ~50% to the table, the rest to Gantt — with a minimum Gantt width
      const tableW=Math.min(Math.round(contentPx*0.5), Math.max(280, contentPx - 320));
      const ganttW=contentPx - tableW;
      const ganttSvg=buildGanttSVG([ganttProj], ganttW, cfg.orientation, {noLabels:true});
      bodyHtml+=`<div class="proj-block">${selProjs.length>1?`<div class="proj-name">${escapeHtml(proj.name)}</div>`:""}
        <div class="split-view">
          <div class="split-table" style="width:${tableW}px;flex-shrink:0">
            <table class="aligned"><thead><tr>${thCols}</tr></thead><tbody>${rows}</tbody></table>
          </div>
          <div class="split-gantt" style="width:${ganttW}px;flex-shrink:0;overflow:hidden">${ganttSvg}</div>
        </div></div>`;
    });
  } else {
    // Tables only (no Gantt) — full width
    selProjs.forEach(proj=>{
      let tasks=[...proj.tasks];
      if(cfg.healthFilter==="active") tasks=tasks.filter(t=>t.health==="yellow"||t.health==="red");
      if(cfg.healthFilter==="complete") tasks=tasks.filter(t=>t.health==="green");
      const thCols=colDefs.map(c=>`<th${c.w?` style="width:${c.w}px"`:""}>${COL_LABELS[c.k]}</th>`).join("");
      const rows=tasks.map((t,i)=>{
        const cells=colDefs.map(c=>`<td class="c-${c.k}">${cellVal(t,c.k,proj.tasks)}</td>`).join("");
        return `<tr class="${i%2?"alt":""}">${cells}</tr>`;
      }).join("");
      bodyHtml+=`<div class="proj-block">${selProjs.length>1?`<div class="proj-name">${escapeHtml(proj.name)}</div>`:""}<table><thead><tr>${thCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
    });
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${cfg.exhibitLabel?escapeHtml(cfg.exhibitLabel)+" &#x2014; ":""}${escapeHtml(cfg.projectTitle)}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
@page{size:${ps.css} ${cfg.orientation};margin:${cfg.margins.top}in ${cfg.margins.right}in ${cfg.margins.bottom}in ${cfg.margins.left}in}
body{padding:${cfg.margins.top}in ${cfg.margins.right}in ${cfg.margins.bottom}in ${cfg.margins.left}in;font-family:'Inter',Arial,sans-serif;font-size:10px;color:#1a1a1a;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@media print{html,body{margin:0!important;padding:0!important}}

function PDFExportModal({data, activePid, onClose}) {
  const projs = Object.values(data.projects);
  const now = new Date();
  const [cfg, setCfg] = useState({
    exhibitLabel: "",
    projectTitle: "",
    preparedBy: "", preparedFor: "",
    docDate: now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),
    orientation: "landscape",
    pageSize: "letter",
    margins: {top:"0.75", right:"0.75", bottom:"0.75", left:"0.75"},
    selProjects: activePid ? [String(activePid)] : projs.map(p => String(p.id)),
    columns: (() => { const PRINTABLE=new Set(["id","name","start","end","duration","health","percentComplete","responsibleParty","predecessors"]); const mc=(data.masterCols||[]).filter(k=>PRINTABLE.has(k)); return mc.length>0?mc:["id","name","start","end","duration","health","responsibleParty"]; })(),
    includeGantt: true,
    healthFilter: "all",
    confidential: "",
  });
  const upd = patch => setCfg(c => ({...c, ...patch}));
  const [headerOpen, setHeaderOpen] = useState(false);

  // Debounced config for preview (avoids re-render on every keystroke)
  const [previewCfg, setPreviewCfg] = useState(cfg);
  useEffect(() => {
    const t = setTimeout(() => setPreviewCfg(cfg), 280);
    return () => clearTimeout(t);
  }, [cfg]);

  // Blob URL for iframe preview
  const [previewUrl, setPreviewUrl] = useState(null);
  useEffect(() => {
    const html = buildPDFHtml(previewCfg, data, true);
    const blob = new Blob([html], {type:"text/html"});
    const url  = URL.createObjectURL(blob);
    setPreviewUrl(url);
    return () => URL.revokeObjectURL(url);
  }, [previewCfg]);

  // Measure preview pane width for scaling
  const previewPaneRef = useRef(null);
  const [paneW, setPaneW] = useState(760);
  const [paneH, setPaneH] = useState(520);
  useEffect(() => {
    const el = previewPaneRef.current; if (!el) return;
    const obs = new ResizeObserver(([e]) => { setPaneW(e.contentRect.width); setPaneH(e.contentRect.height); });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  const _ps = PAGE_SIZES[cfg.pageSize] || PAGE_SIZES.letter;
  const pageW = Math.round((cfg.orientation === "landscape" ? _ps.h : _ps.w) * 96);
  const pageH = Math.round((cfg.orientation === "landscape" ? _ps.w : _ps.h) * 96);

  // iframe reports its full content height via postMessage — more reliable than reading contentDocument
  const iframeRef = useRef(null);
  const [iframeH, setIframeH] = useState(pageH);
  useEffect(() => { setIframeH(pageH); }, [pageH]);
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === 'planarPreviewHeight') setIframeH(Math.max(pageH, e.data.h));
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [pageH]);

  const fitScale = Math.min(1, (paneW - 48) / pageW);
  const [previewZoom, setPreviewZoom] = useState(1);
  const scale = fitScale * previewZoom;

  // Transparent overlay sits on top of the iframe so wheel events aren't swallowed by the iframe boundary
  const overlayRef = useRef(null);
  useEffect(() => {
    const el = overlayRef.current;
    if (!el) return;
    const handler = e => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      e.stopPropagation();
      setPreviewZoom(z => Math.min(4, Math.max(0.2, z * (e.deltaY < 0 ? 1.1 : 1/1.1))));
    };
    el.addEventListener('wheel', handler, {passive: false});
    return () => el.removeEventListener('wheel', handler);
  }, []);

  const COL_OPTS = [
    {k:"id",label:"ID"},{k:"name",label:"Task Name"},{k:"start",label:"Start"},
    {k:"end",label:"End"},{k:"duration",label:"Duration"},{k:"health",label:"Status"},
    {k:"percentComplete",label:"% Done"},{k:"responsibleParty",label:"Owner"},
    {k:"predecessors",label:"Predecessors"},
  ];

  const openPrint = () => {
    const html = buildPDFHtml(cfg, data);
    const w = window.open("","_blank","width=1100,height=820");
    w.document.write(html); w.document.close();
  };

  const Toggle = ({on,onChange}) => (

      ))}

      <span style={{fontSize:11,color:"var(--txt)",flexShrink:0}}>{label}</span>
      {children}
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"#000000a0",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={onClose}>
      <div style={{background:"var(--surf)",border:"1px solid var(--bd2)",borderRadius:10,
        width:"min(98vw,1700px)",height:"min(96vh,960px)",display:"flex",flexDirection:"column",overflow:"hidden"}}
        onClick={e=>e.stopPropagation()}>

        {/* ── Top bar ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"12px 18px",borderBottom:"1px solid var(--bd)",flexShrink:0,background:"#fff"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"var(--amber)",letterSpacing:".07em",textTransform:"uppercase",lineHeight:1,marginBottom:2}}>EXPORT</div>
              <div style={{fontSize:14,fontWeight:600,color:"var(--txt)"}}>PDF / Print Exhibit</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>

              style={{background:"var(--amber)",color:"#fff",borderColor:"var(--amber)",padding:"5px 16px",fontWeight:600,fontSize:12}}>
              Print / Save as PDF ↗

                      background:isActive?"var(--amber)":"transparent",color:isActive?"#fff":"var(--mut)",transition:"background .12s,color .12s"}}>{p.l}</span>;
                })}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {[{k:"top",l:"Top"},{k:"right",l:"Right"},{k:"bottom",l:"Bot."},{k:"left",l:"Left"}].map(({k,l})=>(

                    <div style={{position:"relative",flex:1,display:"flex",alignItems:"center"}}>
                      <input type="number" step="0.25" min="0" max="2" value={cfg.margins[k]}
                        onChange={e=>upd({margins:{...cfg.margins,[k]:e.target.value}})}
                        style={{width:"100%",background:"var(--bg)",border:"1px solid var(--bd2)",borderRadius:3,
                          padding:"3px 22px 3px 6px",fontSize:11,color:"var(--txt)",fontFamily:"inherit",outline:"none"}}
                        onFocus={e=>e.target.style.borderColor="var(--blue)"}
                        onBlur={e=>e.target.style.borderColor="var(--bd2)"} />
                      <span style={{position:"absolute",right:5,fontSize:9,color:"var(--mut)",pointerEvents:"none"}}>in</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Collapsible Header / Cover section */}
            <div onClick={()=>setHeaderOpen(o=>!o)}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",
                padding:"6px 0 5px",borderBottom:"1px solid var(--bd)",marginBottom:5,userSelect:"none"}}
              onMouseEnter={e=>e.currentTarget.style.opacity="0.7"}
              onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
              <span style={{fontSize:9,fontWeight:700,color:"var(--mut)",letterSpacing:".08em",textTransform:"uppercase"}}>
                Header / Cover
              </span>
              <span style={{fontSize:10,color:"var(--mut)",transform:headerOpen?"rotate(180deg)":"rotate(0deg)",
                transition:"transform .2s",display:"inline-block",lineHeight:1}}>▾</span>
            </div>
            {headerOpen && (
              <div style={{display:"flex",flexDirection:"column",gap:1,marginBottom:4}}>
                <Row label="Exhibit"><Field value={cfg.exhibitLabel} onChange={v=>upd({exhibitLabel:v})} placeholder="Exhibit A" /></Row>
                <Row label="Title"><Field value={cfg.projectTitle} onChange={v=>upd({projectTitle:v})} placeholder="Schedule title" /></Row>
                <Row label="Prep. by"><Field value={cfg.preparedBy} onChange={v=>upd({preparedBy:v})} placeholder="Name / company" /></Row>
                <Row label="Prep. for"><Field value={cfg.preparedFor} onChange={v=>upd({preparedFor:v})} placeholder="Client" /></Row>
                <Row label="Date"><Field value={cfg.docDate} onChange={v=>upd({docDate:v})} /></Row>
                <Row label="Conf. tag"><Field value={cfg.confidential} onChange={v=>upd({confidential:v})} placeholder="Confidential" /></Row>
              </div>
            )}

            <SHdr title="Columns" />
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              {COL_OPTS.map(c=>(
                <label key={c.k} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",padding:"3px 4px",borderRadius:3,transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--surf)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
